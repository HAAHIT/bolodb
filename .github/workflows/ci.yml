name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Pin to match .pre-commit-config.yaml so CI and local hooks lint
        # identically; an unpinned install pulls whatever ruff released last,
        # whose changing defaults have broken CI before.
        pip install ruff==0.15.22
        pip install -r backend/requirements.txt

    - name: Lint with Ruff
      run: |
        cd backend
        ruff check .

    - name: Run tests with coverage
      run: |
        PYTHONPATH=. pytest --cov=backend/app --cov-report=xml --cov-report=term tests/

    - name: Upload coverage report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run check

    - name: Build
      run: npm run build
