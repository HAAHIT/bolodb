services:
  # ── Backend: FastAPI / Uvicorn ──
  backend:
    build:
      context: .
      dockerfile: backend/DOCKERFILE
    restart: unless-stopped
    expose:
      - "4321"
    volumes:
      - bolodb-data:/home/bolodb/.bolodb
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}
      - DATABASE_URL=${DATABASE_URL:? Database URL must be set}
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=true
      - SKIP_DB_LOCK=true
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL must be set}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY must be set}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET must be set}
      - MYEMAILVERIFIER_API_KEY=${MYEMAILVERIFIER_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:4321/api/health', timeout=3).raise_for_status()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bolodb-net

  # ── Frontend: Svelte (Vite) dev server ──
  frontend:
    build:
      context: ./frontend
      dockerfile: DOCKERFILE.dev
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    expose:
      - "5173"
    environment:
      - BACKEND_URL=http://backend:4321
      - PUBLIC_POSTHOG_PROJECT_TOKEN=${PUBLIC_POSTHOG_PROJECT_TOKEN}
      - PUBLIC_POSTHOG_HOST=${PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      - VITE_SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL must be set}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY must be set}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bolodb-net

  # ── Nginx: Reverse proxy + Vite dev server ──
  nginx:
    build:
      context: ./nginx
      dockerfile: DOCKERFILE
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - bolodb-net

volumes:
  bolodb-data:
  bolodb-postgres-data:
  bolodb-postgres-wal:

networks:
  bolodb-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:b010::/64
