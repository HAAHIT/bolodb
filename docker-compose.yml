# ──────────────────────────────────────────────
#  BoloDB  ·  Docker Compose
# ──────────────────────────────────────────────
#  Usage:
#    docker compose up --build        # build & start
#    docker compose up --build -d     # detached
#    docker compose down              # stop & remove
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL: Application state ──
  postgres:
    image: postgres:16-alpine
    container_name: bolodb-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bolodb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bolodb}
      POSTGRES_DB: bolodb
    volumes:
      - bolodb-postgres-data:/var/lib/postgresql/data
      - bolodb-postgres-wal:/wal_archive
      - ./postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - bolodb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PgBouncer: Connection pool ──
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: bolodb-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: bolodb
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-bolodb}
      POSTGRESQL_DATABASE: bolodb
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MAX_CLIENT_CONN: 100
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolodb -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bolodb-net

  # ── Backend: FastAPI / Uvicorn ──
  backend:
    build:
      context: .
      dockerfile: backend/DOCKERFILE
    container_name: bolodb-backend
    restart: unless-stopped
    ports:
      - "4321:4321"
    volumes:
      - bolodb-data:/home/bolodb/.bolodb
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - DATABASE_URL=postgresql+asyncpg://bolodb:${POSTGRES_PASSWORD:-bolodb}@pgbouncer:6432/bolodb
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=true
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      pgbouncer:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bolodb-net

  # ── Frontend: Svelte (Vite) dev server ──
  frontend:
    build:
      context: ./frontend
      dockerfile: DOCKERFILE.dev
    container_name: bolodb-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:4321
      - PUBLIC_POSTHOG_PROJECT_TOKEN=${PUBLIC_POSTHOG_PROJECT_TOKEN}
      - PUBLIC_POSTHOG_HOST=${PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bolodb-net

  # ── Nginx: Reverse proxy + Vite dev server ──
  nginx:
    build:
      context: ./nginx
      dockerfile: DOCKERFILE
    container_name: bolodb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - bolodb-net

volumes:
  bolodb-data:
  bolodb-postgres-data:
  bolodb-postgres-wal:

networks:
  bolodb-net:
    driver: bridge
