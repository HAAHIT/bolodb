services:
  # ── Backend: FastAPI / Uvicorn ──
  backend:
    build:
      context: .
      dockerfile: backend/DOCKERFILE
    restart: unless-stopped
    expose:
      - "4321"
    volumes:
      - bolodb-data:/home/bolodb/.bolodb
      - bolodb-app-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - RECENT_CONNECTIONS_MASTER_KEY=${RECENT_CONNECTIONS_MASTER_KEY:?RECENT_CONNECTIONS_MASTER_KEY must be set}
      - RECENT_CONNECTIONS_KEY=${RECENT_CONNECTIONS_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}
      - DATABASE_URL=${DATABASE_URL:? Database URL must be set}
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=true
      - SKIP_DB_LOCK=true
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL must be set}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY must be set}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET must be set}
      - MYEMAILVERIFIER_API_KEY=${MYEMAILVERIFIER_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:4321/api/health', timeout=3).raise_for_status()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Migrations run before the server binds, and a database that needs the
      # whole history takes longer than a few seconds — don't call the
      # container unhealthy while it is still migrating.
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bolodb-net

  # ── Nginx: static frontend + /api reverse proxy ──
  nginx:
    build:
      context: .
      dockerfile: nginx/DOCKERFILE
      args:
        PUBLIC_POSTHOG_PROJECT_TOKEN: ${PUBLIC_POSTHOG_PROJECT_TOKEN:-}
        PUBLIC_POSTHOG_HOST: ${PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    restart: unless-stopped
    expose:
      - "8080"
    labels:  # <--- ADD THIS
      - "traefik.http.services.${COOLIFY_CONTAINER_NAME:-nginx}.loadbalancer.server.port=8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bolodb-net

volumes:
  bolodb-data:
  bolodb-postgres-data:
  bolodb-postgres-wal:
  bolodb-app-data:

networks:
  bolodb-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:b010::/64
