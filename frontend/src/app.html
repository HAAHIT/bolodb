<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("bolodb_theme");
          var theme = stored === "dark" ? "dark" : stored ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="BoloDB — Ask your data in plain English. Trust the answer you get back."
    />
    <link
      rel="preload"
      href="/fonts/HankenGrotesk.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/JetBrainsMono.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
