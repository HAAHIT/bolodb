server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse-proxy API calls to the FastAPI backend ──
    location /api/ {
        proxy_pass         http://backend:4321;
        proxy_http_version 1.1;
        proxy_buffering     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;

        # Generous timeouts for LLM-powered query endpoints
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    # SvelteKit data requests for client-only routes
    location ~ /__data\.json {
        try_files $uri @empty_data;
    }

    location @empty_data {
        add_header Content-Type application/json;
        return 200 '{"type":"data","nodes":[null,null,null]}';
    }

    # ── Static SPA (adapter-static) ──
    location / {
        # /index.html is the prerendered marketing homepage; client-only
        # routes fall back to the SPA shell in 200.html.
        try_files $uri $uri.html $uri/ /200.html;
    }

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
