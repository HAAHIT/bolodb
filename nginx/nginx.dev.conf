server {
    listen 80;
    server_name _;

    # ── Proxy frontend requests to Vite dev server ──
    # Variable + resolver so nginx starts even if frontend
    # is still coming up (avoids "host not found in upstream").
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $frontend_upstream frontend:5173;

    location / {
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
        proxy_buffering     off;
    }

    location /api/ {
        set $backend_upstream backend:4321;
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_buffering     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
