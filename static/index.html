<!DOCTYPE html>
<html lang="en" data-theme="crisp">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoloDB - Ask your data. Trust the answer.</title>
<style>
/* ============================================================
   BoloDB — design system
   Two themes: "crisp" (clean modern SaaS) + "soft" (warm/human)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* confidence semantics — shared across themes */
  --c-high:   #1B9E6B;
  --c-high-ink:#0F6E48;
  --c-high-tint:#E7F5EE;
  --c-med:    #C2891B;
  --c-med-ink:#8A6210;
  --c-med-tint:#FaF1DA;
  --c-low:    #C75D4E;
  --c-low-ink:#9A4337;
  --c-low-tint:#F8E9E5;

  --ok:#1B9E6B;
  --font-ui: 'Hanken Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* easing */
  --ease: cubic-bezier(.22,.61,.36,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}

/* ---------- THEME: crisp (default) ---------- */
[data-theme="crisp"] {
  --bg: #EEF1F0;
  --bg-grad-a:#EFF2F1;
  --bg-grad-b:#E7ECEA;
  --surface:#FFFFFF;
  --surface-2:#F7F9F8;
  --surface-3:#F0F3F2;
  --ink:#16201B;
  --ink-2:#2C3A33;
  --muted:#5C6B63;
  --faint:#8B978F;
  --border:#E3E8E5;
  --border-2:#D5DCD8;
  --brand:#1B9E6B;
  --brand-ink:#0F6E48;
  --brand-2:#17875B;
  --brand-tint:#E7F5EE;
  --brand-tint-2:#D6EEE0;
  --radius-xs:8px;
  --radius-sm:11px;
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:26px;
  --shadow-sm:0 1px 2px rgba(20,40,30,.06), 0 1px 1px rgba(20,40,30,.04);
  --shadow:0 1px 2px rgba(20,40,30,.05), 0 6px 18px -6px rgba(20,40,30,.14);
  --shadow-lg:0 2px 4px rgba(20,40,30,.05), 0 24px 48px -16px rgba(20,40,30,.22);
  --shadow-brand:0 8px 22px -8px rgba(27,158,107,.5);
  --ring: rgba(27,158,107,.16);
}

/* ---------- THEME: soft (warm/human) ---------- */
[data-theme="soft"] {
  --bg:#F2ECE3;
  --bg-grad-a:#F4EEE5;
  --bg-grad-b:#EDE4D7;
  --surface:#FFFFFF;
  --surface-2:#FBF7F1;
  --surface-3:#F5EFE6;
  --ink:#231E18;
  --ink-2:#3B342B;
  --muted:#796E60;
  --faint:#A99C8B;
  --border:#ECE3D6;
  --border-2:#E0D4C3;
  --brand:#2BA277;
  --brand-ink:#16704F;
  --brand-2:#23906A;
  --brand-tint:#E7F4ED;
  --brand-tint-2:#D6ECDF;
  --radius-xs:11px;
  --radius-sm:15px;
  --radius:19px;
  --radius-lg:26px;
  --radius-xl:34px;
  --shadow-sm:0 1px 2px rgba(80,60,30,.06), 0 1px 1px rgba(80,60,30,.04);
  --shadow:0 2px 6px rgba(90,68,34,.06), 0 10px 26px -8px rgba(90,68,34,.18);
  --shadow-lg:0 3px 8px rgba(90,68,34,.06), 0 30px 60px -18px rgba(90,68,34,.26);
  --shadow-brand:0 10px 28px -8px rgba(43,162,119,.5);
  --ring: rgba(43,162,119,.18);
}

* { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; }
body {
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root { height:100vh; }

button { font-family:inherit; cursor:pointer; }
input,textarea { font-family:inherit; }
::selection { background:var(--brand-tint-2); }

/* scrollbars */
*::-webkit-scrollbar{ width:10px; height:10px; }
*::-webkit-scrollbar-thumb{ background:var(--border-2); border-radius:20px; border:3px solid transparent; background-clip:padding-box; }
*::-webkit-scrollbar-thumb:hover{ background:var(--faint); background-clip:padding-box; }
*::-webkit-scrollbar-track{ background:transparent; }

/* ============================ shell ============================ */
.app-shell{
  height:100vh; width:100vw; overflow:hidden;
  background:
    radial-gradient(1200px 700px at 82% -8%, var(--brand-tint) 0%, transparent 55%),
    linear-gradient(160deg, var(--bg-grad-a), var(--bg-grad-b));
  display:flex; flex-direction:column;
}

/* slide transitions — transform-only so content is ALWAYS visible even if
   the animation timeline is frozen (e.g. a backgrounded/throttled tab). */
.page{ animation:pageIn .5s var(--ease) both; height:100%; }
@keyframes pageIn{ from{ transform:translateY(8px);} to{transform:none;} }

@keyframes rise{ from{transform:translateY(10px);} to{transform:none;} }
@keyframes pop{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }
@keyframes fadein{ from{opacity:0;} to{opacity:1;} }
.rise{ animation:rise .5s var(--ease) both; }

/* ============================ buttons ============================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  border:1px solid transparent; border-radius:var(--radius-sm);
  font-weight:600; font-size:15px; letter-spacing:-.01em;
  padding:12px 20px; transition:transform .14s var(--ease), box-shadow .18s var(--ease), background .18s, border-color .18s, color .18s;
  white-space:nowrap; line-height:1;
}
.btn:active{ transform:translateY(1px) scale(.99); }
.btn-primary{ background:var(--brand); color:#fff; box-shadow:var(--shadow-brand); }
.btn-primary:hover{ background:var(--brand-2); box-shadow:0 12px 30px -8px var(--ring); transform:translateY(-1px); }
.btn-primary:disabled{ background:var(--border-2); color:var(--faint); box-shadow:none; cursor:not-allowed; transform:none; }
.btn-ghost{ background:var(--surface); color:var(--ink); border-color:var(--border-2); box-shadow:var(--shadow-sm); }
.btn-ghost:hover{ border-color:var(--faint); transform:translateY(-1px); box-shadow:var(--shadow); }
.btn-quiet{ background:transparent; color:var(--muted); padding:9px 13px; }
.btn-quiet:hover{ background:var(--surface-3); color:var(--ink); }
.btn-lg{ padding:15px 26px; font-size:16px; border-radius:var(--radius); }
.btn-sm{ padding:8px 14px; font-size:13.5px; gap:6px; }
.btn-block{ width:100%; }

/* ============================ generic card ============================ */
.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow); }

.chip{
  display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  padding:7px 13px; border-radius:999px; font-size:13.5px; font-weight:600;
  border:1px solid var(--border-2); background:var(--surface); color:var(--ink-2);
  transition:all .15s var(--ease); cursor:pointer;
}
.chip:hover{ border-color:var(--brand); color:var(--brand-ink); background:var(--brand-tint); transform:translateY(-1px); }

/* confidence pill */
.conf{
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 13px 6px 11px; border-radius:999px;
  font-size:13px; font-weight:700; letter-spacing:-.01em;
  border:1px solid; line-height:1;
}
.conf .dot{ width:9px; height:9px; border-radius:50%; box-shadow:0 0 0 3px var(--dot-halo); }
.conf-high{ color:var(--c-high-ink); background:var(--c-high-tint); border-color:#BFE6CF; --dot-halo:rgba(27,158,107,.16); }
.conf-high .dot{ background:var(--c-high); }
.conf-med{ color:var(--c-med-ink); background:var(--c-med-tint); border-color:#EBD7A2; --dot-halo:rgba(194,137,27,.16); }
.conf-med .dot{ background:var(--c-med); }
.conf-low{ color:var(--c-low-ink); background:var(--c-low-tint); border-color:#EBC6BD; --dot-halo:rgba(199,93,78,.16); }
.conf-low .dot{ background:var(--c-low); }

/* pulsing dot for "thinking" */
@keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
.pulse{ animation:pulse 1.1s var(--ease) infinite; }

/* shimmer skeleton */
@keyframes shimmer{ 100%{ background-position:-200% 0; } }
.skel{ background:linear-gradient(90deg,var(--surface-3) 8%,var(--surface-2) 18%,var(--surface-3) 33%); background-size:200% 100%; animation:shimmer 1.3s linear infinite; border-radius:8px; }

/* spinner */
@keyframes spin{ to{ transform:rotate(360deg); } }
.spin{ animation:spin .8s linear infinite; }

/* focus ring */
.focusable:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring); border-color:var(--brand); }

/* input */
.field{
  width:100%; border:1.5px solid var(--border-2); background:var(--surface);
  border-radius:var(--radius-sm); padding:13px 15px; font-size:15px; color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
.field::placeholder{ color:var(--faint); }
.field:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 4px var(--ring); }

.mono{ font-family:var(--font-mono); }
.tnum{ font-variant-numeric:tabular-nums; }

/* subtle divider */
.hr{ height:1px; background:var(--border); border:0; }

/* tooltip-ish label */
.kbd{ font-family:var(--font-mono); font-size:11px; padding:2px 6px; border-radius:6px; background:var(--surface-3); border:1px solid var(--border-2); color:var(--muted); }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
/* ============================================================
   BoloDB — sample "TechStore" data + canned answer bank
   Exposed as window.BOLO
   ============================================================ */
(function () {

  // ---- schema (compact-format strings shown in UI) ----
  const schema = [
    { name:"customers", rows:"4,820", cols:["id PK","name","email","segment","country","created_at"],
      compact:"customers(id PK, name, email, segment[consumer,business,vip], country, created_at)" },
    { name:"orders", rows:"38,104", cols:["id PK","customer_id→customers.id","status","total_amount","created_at"],
      compact:"orders(id PK, customer_id→customers.id, status[completed,pending,cancelled,refunded], total_amount, created_at)" },
    { name:"order_items", rows:"96,512", cols:["id PK","order_id→orders.id","product_id→products.id","quantity","unit_price"],
      compact:"order_items(id PK, order_id→orders.id, product_id→products.id, quantity, unit_price)" },
    { name:"products", rows:"312", cols:["id PK","name","category","price","stock"],
      compact:"products(id PK, name, category[laptops,phones,accessories,monitors,audio], price, stock)" },
    { name:"payments", rows:"37,440", cols:["id PK","order_id→orders.id","method","amount","paid_at"],
      compact:"payments(id PK, order_id→orders.id, method[card,paypal,bank], amount, paid_at)" },
  ];

  // ---- glossary drafts proposed during onboarding ----
  const glossary = [
    { term:"Revenue", def:"Sum of total_amount on orders with status = completed", maps:"orders.total_amount", alt:["Net sales","Gross sales","Paid amount"] },
    { term:"Active customer", def:"A customer with at least one order in the last 90 days", maps:"orders.created_at", alt:["Any registered customer","Ordered in last 30 days"] },
    { term:"Top product", def:"Product ranked by units sold (sum of quantity)", maps:"order_items.quantity", alt:["By revenue","By number of orders"] },
  ];

  // ---- starter Q→A pairs generated & run during onboarding ----
  const starters = [
    {
      q:"How many orders were completed last month?",
      restatement:"Count of orders with status “completed” created in the previous calendar month",
      sql:"SELECT COUNT(*) AS completed_orders\nFROM orders\nWHERE status = 'completed'\n  AND created_at >= date('now','start of month','-1 month')\n  AND created_at <  date('now','start of month');",
      columns:["completed_orders"],
      rows:[["3,182"]],
    },
    {
      q:"Which product category brings in the most revenue?",
      restatement:"Total revenue per product category, highest first",
      sql:"SELECT p.category, ROUND(SUM(oi.quantity*oi.unit_price)) AS revenue\nFROM order_items oi\nJOIN products p ON p.id = oi.product_id\nJOIN orders   o ON o.id = oi.order_id\nWHERE o.status = 'completed'\nGROUP BY p.category\nORDER BY revenue DESC;",
      columns:["category","revenue"],
      rows:[["laptops","$1,284,900"],["phones","$902,340"],["monitors","$418,120"],["audio","$211,470"],["accessories","$96,880"]],
    },
    {
      q:"How many customers do we have in each segment?",
      restatement:"Count of customers grouped by segment",
      sql:"SELECT segment, COUNT(*) AS customers\nFROM customers\nGROUP BY segment\nORDER BY customers DESC;",
      columns:["segment","customers"],
      rows:[["consumer","3,910"],["business","712"],["vip","198"]],
    },
  ];

  // ---- main answer bank (matched by keyword to typed question) ----
  // confidence here is the BASE for a brand-new question. The app upgrades it
  // when a similar verified pair exists.
  const bank = [
    {
      id:"top_customers",
      keys:["top customer","biggest spender","best customer","who spends","highest spend","top buyers"],
      q:"Top customers by spend this month",
      restatement:"Total spend per customer this month, highest first",
      sql:"SELECT c.name, ROUND(SUM(o.total_amount)) AS spend\nFROM orders o\nJOIN customers c ON c.id = o.customer_id\nWHERE o.status = 'completed'\n  AND o.created_at >= date('now','start of month')\nGROUP BY c.id\nORDER BY spend DESC\nLIMIT 6;",
      columns:["name","spend"],
      rows:[["Ananya Rao","$7,540"],["Marcus Hale","$6,210"],["Priya Menon","$5,880"],["Devin Cole","$5,120"],["Sofia Lund","$4,690"],["Tom Becker","$4,275"]],
      base:"medium",
    },
    {
      id:"low_stock",
      keys:["low stock","low on stock","on stock","running out","restock","out of stock","inventory","need to reorder","reorder"],
      q:"Which products are low on stock?",
      restatement:"Products with fewer than 15 units in stock, lowest first",
      sql:"SELECT name, category, stock\nFROM products\nWHERE stock < 15\nORDER BY stock ASC;",
      columns:["name","category","stock"],
      rows:[["Aurora 14\" Laptop","laptops","3"],["NovaBuds Pro","audio","6"],["PixelView 27\"","monitors","8"],["Glide Wireless Mouse","accessories","11"],["Zephyr Phone X","phones","14"]],
      base:"medium",
    },
    {
      id:"pending_orders",
      keys:["pending","awaiting","not shipped","open orders","unfulfilled","how many pending"],
      q:"How many orders are pending right now?",
      restatement:"Count of orders currently in “pending” status",
      sql:"SELECT COUNT(*) AS pending_orders\nFROM orders\nWHERE status = 'pending';",
      columns:["pending_orders"],
      rows:[["247"]],
      base:"medium",
    },
    {
      id:"revenue_category",
      keys:["revenue by category","sales by category","category revenue","which category","earn the most","category sales"],
      q:"Revenue by category",
      restatement:"Total revenue per product category, highest first",
      sql:"SELECT p.category, ROUND(SUM(oi.quantity*oi.unit_price)) AS revenue\nFROM order_items oi\nJOIN products p ON p.id = oi.product_id\nJOIN orders   o ON o.id = oi.order_id\nWHERE o.status = 'completed'\nGROUP BY p.category\nORDER BY revenue DESC;",
      columns:["category","revenue"],
      rows:[["laptops","$1,284,900"],["phones","$902,340"],["monitors","$418,120"],["audio","$211,470"],["accessories","$96,880"]],
      base:"medium",
    },
    {
      id:"new_customers",
      keys:["new customer","signed up","new sign","this week","recently joined","new accounts"],
      q:"How many new customers signed up this week?",
      restatement:"Count of customers created in the last 7 days",
      sql:"SELECT COUNT(*) AS new_customers\nFROM customers\nWHERE created_at >= date('now','-7 days');",
      columns:["new_customers"],
      rows:[["86"]],
      base:"medium",
    },
    {
      id:"refund_rate",
      keys:["refund","returned","refund rate","cancellation","cancelled rate","how many refunds"],
      q:"What's our refund rate this quarter?",
      restatement:"Share of orders this quarter with status “refunded”",
      sql:"SELECT ROUND(100.0*\n  SUM(CASE WHEN status='refunded' THEN 1 END)/COUNT(*),1) AS refund_pct\nFROM orders\nWHERE created_at >= date('now','start of month','-2 months');",
      columns:["refund_pct"],
      rows:[["2.4%"]],
      base:"medium",
    },
    {
      id:"avg_order",
      keys:["average order","aov","avg order value","mean order","typical order"],
      q:"What is the average order value?",
      restatement:"Average total_amount across completed orders",
      sql:"SELECT ROUND(AVG(total_amount),2) AS avg_order_value\nFROM orders\nWHERE status = 'completed';",
      columns:["avg_order_value"],
      rows:[["$284.10"]],
      base:"medium",
    },
    {
      id:"vip_spend",
      keys:["vip","vip spend","vip customer","premium customer","how much do vip"],
      q:"How much have VIP customers spent in total?",
      restatement:"Total completed-order spend from customers in the “vip” segment",
      sql:"SELECT ROUND(SUM(o.total_amount)) AS vip_spend\nFROM orders o\nJOIN customers c ON c.id = o.customer_id\nWHERE c.segment = 'vip' AND o.status = 'completed';",
      columns:["vip_spend"],
      rows:[["$412,650"]],
      base:"medium",
    },
  ];

  // a deliberately weak result to demonstrate honesty (no rows / low confidence)
  const lowResult = {
    id:"no_rows",
    restatement:"Orders placed on the moon last Tuesday",
    sql:"SELECT * FROM orders\nWHERE ship_location = 'moon'\n  AND created_at = date('now','-? days');",
    columns:["id","status","total_amount"],
    rows:[],
    confidence:"low",
    reason:"the query ran but returned no rows — this may not match how your data is stored. Try rephrasing.",
  };

  // returned when we genuinely can't map a question to the schema — honesty over a guess
  const unknownResult = {
    id:"unknown",
    restatement:"I couldn't confidently match this question to your tables",
    sql:"-- No reliable query was generated for this question.\n-- Try naming a metric or table, e.g. revenue, orders, customers, stock.",
    columns:[],
    rows:[],
    confidence:"low",
    reason:"I'm not sure how to answer this one yet — try rephrasing, or name the metric or table you mean.",
  };

  // suggested questions surfaced as chips
  const suggestions = [
    "Top customers by spend this month",
    "Which products are low on stock?",
    "Revenue by category",
    "How many orders are pending right now?",
    "What is the average order value?",
    "How many new customers signed up this week?",
  ];

  const providers = [
    { id:"ollama", name:"Local", sub:"Ollama", privacy:"Data never leaves your machine", cost:"Free",
      accuracy:"Good — improves as it learns", badge:"Private", model:"llama3.2", tier:"small",
      tone:"brand", note:"Recommended for private data" },
    { id:"claude", name:"Claude", sub:"Anthropic API", privacy:"Schema + question sent to Anthropic", cost:"Pay per use",
      accuracy:"Highest", badge:"Most accurate", model:"claude-sonnet", tier:"large" },
    { id:"openai", name:"OpenAI", sub:"OpenAI API", privacy:"Schema + question sent to OpenAI", cost:"Pay per use",
      accuracy:"High", badge:"", model:"gpt-4o", tier:"large" },
    { id:"groq", name:"Groq", sub:"Groq API", privacy:"Schema + question sent to Groq", cost:"Pay per use",
      accuracy:"High, very fast", badge:"Fastest", model:"llama-70b", tier:"large" },
  ];

  // trust levels keyed by verified count
  function trustFor(n){
    if (n >= 7) return { key:"trusted",   label:"Trusted",   range:[7,Infinity], idx:2,
      behaviour:"Answers are shown directly. Reasoning is one tap away.", next:null };
    if (n >= 3) return { key:"assisted",  label:"Assisted",  range:[3,6], idx:1,
      behaviour:"Confident answers are shown; novel ones get a second look.", next:7 };
    return { key:"supervised", label:"Supervised", range:[0,2], idx:0,
      behaviour:"Every answer waits for your confirmation while it learns.", next:3 };
  }

  const wrongReasons = [
    { id:"numbers", label:"Wrong numbers" },
    { id:"filter",  label:"Wrong filter / dates" },
    { id:"intent",  label:"Not what I meant" },
    { id:"missing", label:"Missing data" },
    { id:"other",   label:"Something else" },
  ];

  function matchBank(text){
    const t = (text||"").toLowerCase();
    if (/moon|jupiter|yesterday on mars|teleport/.test(t)) return { type:"low" };
    let best=null, score=0;
    bank.forEach(b=>{
      let s=0;
      b.keys.forEach(k=>{ if (t.includes(k)) s += k.length; });
      if (s>score){ score=s; best=b; }
    });
    if (best && score>0) return { type:"bank", item:best };
    // genuinely unmatched -> be honest rather than returning a random answer
    return { type:"unknown" };
  }

  window.BOLO = { schema, glossary, starters, bank, lowResult, unknownResult, suggestions, providers, trustFor, wrongReasons, matchBank };
})();

</script>

<script>

// ── BoloDB API helpers ────────────────────────────────────────────────────────
async function apiCall(path, body) {
  const opts = body
    ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
    : {};
  const r = await fetch(path, opts);
  const data = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(data.detail || ('Request failed: ' + r.status));
  return data;
}
// Convert API rows (array of objects) to 2D arrays for ResultTable
function rowsToArrays(columns, rows) {
  return (rows || []).map(row =>
    (columns || []).map(col => {
      const v = row[col];
      return v === null || v === undefined ? '' : String(v);
    })
  );
}
window.apiCall = apiCall;
window.rowsToArrays = rowsToArrays;

</script>

const Ico = {

  gear: (p)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none" {...p}><circle cx="12" cy="12" r="3.2" stroke="currentColor" strokeWidth="1.9"/><path d="M12 2.5v2.3M12 19.2v2.3M21.5 12h-2.3M4.8 12H2.5M18.7 5.3l-1.6 1.6M6.9 17.1l-1.6 1.6M18.7 18.7l-1.6-1.6M6.9 6.9L5.3 5.3" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round"/></svg>),
  chevron: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  caret: (p)=>(<svg width="14" height="14" viewBox="0 0 24 24" fill="none" {...p}><path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  code: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M8 8l-4 4 4 4M16 8l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  table: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><rect x="3.5" y="4.5" width="17" height="15" rx="2.2" stroke="currentColor" strokeWidth="1.8"/><path d="M3.5 9.5h17M9 9.5v10M3.5 14.5h17" stroke="currentColor" strokeWidth="1.6"/></svg>),
  bolt: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" fill="currentColor"/></svg>),
  lock: (p)=>(<svg width="15" height="15" viewBox="0 0 24 24" fill="none" {...p}><rect x="5" y="10.5" width="14" height="9.5" rx="2.4" stroke="currentColor" strokeWidth="1.8"/><path d="M8 10.5V8a4 4 0 018 0v2.5" stroke="currentColor" strokeWidth="1.8"/></svg>),
  arrow: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  plus: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round"/></svg>),
  history: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M4 12a8 8 0 1 0 2.5-5.8M4 4v4h4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><path d="M12 8v4l3 2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  flask: (p)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M9 3h6M10 3v6l-5 8.5A2 2 0 006.7 21h10.6a2 2 0 001.7-3.5L14 9V3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>),
};

/* ---------- Logo ---------- */
function Logo({ size=28, withText=true, sub=false }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <Ico.logo style={{width:size,height:size}}/>
      {withText && (
        <div style={{lineHeight:1}}>
          <div style={{fontWeight:800,fontSize:size*.66,letterSpacing:"-.02em",color:"var(--ink)"}}>Bolo<span style={{color:"var(--brand)"}}>DB</span></div>
          {sub && <div style={{fontSize:11.5,color:"var(--faint)",fontWeight:600,marginTop:3}}>Ask your data. Trust the answer.</div>}
        </div>
      )}
    </div>
  );
}

/* ---------- Button ---------- */
function Button({ kind="primary", size, icon, iconRight, children, className="", ...rest }) {
  const cls = `btn btn-${kind} ${size?`btn-${size}`:""} ${className}`.trim();
  return <button className={cls} {...rest}>{icon}{children}{iconRight}</button>;
}

/* ---------- ConfidenceBadge ---------- */
function ConfidenceBadge({ level="medium", reason, compact=false }) {
  const map = { high:["conf-high","High confidence"], medium:["conf-med","Medium confidence"], low:["conf-low","Low confidence"] };
  const [cls,label] = map[level] || map.medium;
  return (
    <span className={`conf ${cls}`} title={reason||""}>
      <span className="dot"/>{compact ? label.split(" ")[0] : label}
    </span>
  );
}

/* ---------- TrustMeter (segmented, climbing) ---------- */
function TrustMeter({ count, compact=false }) {
  const t = window.BOLO.trustFor(count);
  const levels = ["Supervised","Assisted","Trusted"];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:compact?6:9}}>
      <div style={{display:"flex",gap:5}}>
        {levels.map((lv,i)=>(
          <div key={lv} style={{flex:1,height:compact?5:7,borderRadius:99,
            background: i<=t.idx ? "var(--brand)" : "var(--border-2)",
            opacity: i<=t.idx ? 1 : .6,
            transition:"background .5s var(--ease), opacity .5s"}}/>
        ))}
      </div>
      {!compact && (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <span style={{fontWeight:700,fontSize:13.5,color:"var(--ink)"}}>{t.label}</span>
          <span style={{fontSize:12,color:"var(--faint)",fontWeight:600}} className="tnum">{count} verified</span>
        </div>
      )}
    </div>
  );
}

/* ---------- ResultTable ---------- */
const ResultTable = React.memo(function ResultTable({ columns, rows, max=8 }) {

  function copyCSV(){
    // Guard against CSV/formula injection: cells starting with =,+,-,@ are
    // prefixed with ' so spreadsheet tools treat them as text, not formulas.
    const cell = (v)=>{
      let s = String(v??'');
      if (/^[=+\-@]/.test(s)) s = "'" + s;
      return (s.includes(',')||s.includes('"')||s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
    };
    const header = columns.map(cell).join(",");
    const body = rows.map(r=>r.map(cell).join(",")).join("\n");
    navigator.clipboard.writeText(header+"\n"+body).catch(()=>{});
  }

  if (!rows || rows.length===0) {
    return (
      <div style={{padding:"22px 18px",textAlign:"center",color:"var(--muted)",
        background:"var(--surface-2)",border:"1px dashed var(--border-2)",borderRadius:"var(--radius)",fontSize:14}}>
        No rows matched — there may be no data that fits this question.
      </div>
    );
  }
  const numeric = (v)=> typeof v==="string" && /^[$]?[\d.,%]+$/.test(v);
  return (
    <div style={{border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden",background:"var(--surface)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"7px 12px 0",background:"var(--surface-2)",borderBottom:"1px solid var(--border)"}}>
        <button onClick={copyCSV} title="Copy all rows as CSV — paste into Excel or Sheets"
          style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,
            background:"transparent",border:"1px solid var(--border-2)",color:"var(--faint)",
            fontSize:11.5,fontWeight:650,cursor:"pointer",transition:"all .15s"}}
          onMouseEnter={e=>{ e.currentTarget.style.background="var(--surface-3)"; e.currentTarget.style.color="var(--ink-2)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="transparent"; e.currentTarget.style.color="var(--faint)"; }}>
          ↓ Copy as CSV
        </button>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
        <thead>
          <tr>
            {columns.map(c=>(
              <th key={c} style={{textAlign:"left",padding:"11px 16px",fontWeight:700,fontSize:11.5,
                letterSpacing:".06em",textTransform:"uppercase",color:"var(--faint)",
                background:"var(--surface-2)",borderBottom:"1px solid var(--border)"}}>{c}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.slice(0,max).map((r,ri)=>(
            <tr key={ri} style={{borderBottom: ri<rows.length-1?"1px solid var(--border)":"none"}}>
              {r.map((cell,ci)=>(
                <td key={ci} className={ci>0&&numeric(cell)?"tnum":""}
                  style={{padding:"11px 16px",color: ci===0?"var(--ink)":"var(--ink-2)",
                    fontWeight: ci===0?600:500,
                    fontFamily: ci>0&&numeric(cell)?"var(--font-mono)":"inherit",
                    textAlign: ci>0&&numeric(cell)?"right":"left",fontSize: ci>0&&numeric(cell)?13.5:14}}>{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
});

/* ---------- SqlBlock (toggle) ---------- */
function SqlBlock({ sql }) {
  const [open,setOpen] = React.useState(false);
  return (
    <div style={{marginTop:2}}>
      <button onClick={()=>setOpen(o=>!o)} className="btn btn-quiet btn-sm"
        style={{padding:"6px 10px",color:"var(--muted)",fontWeight:600}}>
        <Ico.code/> {open?"Hide query":"View the query"} <Ico.caret style={{transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}/>
      </button>
      {open && (
        <pre className="mono" style={{margin:"8px 0 0",padding:"14px 16px",background:"var(--surface-3)",
          border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:12.5,lineHeight:1.6,
          color:"var(--ink-2)",overflowX:"auto",whiteSpace:"pre",animation:"rise .25s var(--ease) both"}}>{sql}</pre>
      )}
    </div>
  );
}

Object.assign(window, { Ico, Logo, Button, ConfidenceBadge, TrustMeter, ResultTable, SqlBlock });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — Connect screen
   ============================================================ */
function ConnectScreen({ engine, setEngine, onConnect }) {
  const P = window.BOLO.providers;
  // --- DB form state ---
  const [dbType,   setDbType]   = React.useState("postgresql");
  const [formMode, setFormMode] = React.useState(true);   // true = friendly form, false = raw URL
  const [host,     setHost]     = React.useState("localhost");
  const [port,     setPort]     = React.useState("5432");
  const [user,     setUser]     = React.useState("");
  const [password, setPassword] = React.useState("");
  const [dbName,   setDbName]   = React.useState("");
  const [filePath, setFilePath] = React.useState("");
  const [dbUrl,    setDbUrl]    = React.useState("");
  // --- connection state ---
  const [connecting,    setConnecting]    = React.useState(null);
  const [error,         setError]         = React.useState("");
  const [ollamaStatus,  setOllamaStatus]  = React.useState(null); // null|loading|ok|fail

  const DB_TYPES = [
    {id:"postgresql", label:"PostgreSQL", port:"5432"},
    {id:"mysql",      label:"MySQL",      port:"3306"},
    {id:"sqlite",     label:"SQLite",     port:null},
    {id:"mssql",      label:"SQL Server", port:"1433"},
    {id:"duckdb",     label:"DuckDB",     port:null},
  ];
  const API_KEY_LINKS = {
    claude:"https://console.anthropic.com/settings/keys",
    openai:"https://platform.openai.com/api-keys",
    groq:"https://console.groq.com/keys",
  };
  const isFileBased = dbType==="sqlite" || dbType==="duckdb";

  // Check Ollama whenever user picks the local engine
  React.useEffect(()=>{
    if (engine!=="ollama") return;
    setOllamaStatus("loading");
    fetch("/api/ollama-check")
      .then(r=>r.json())
      .then(d=>setOllamaStatus(d.ok?"ok":"fail"))
      .catch(()=>setOllamaStatus("fail"));
  },[engine]);

  function recheckOllama(){
    setOllamaStatus("loading");
    fetch("/api/ollama-check")
      .then(r=>r.json())
      .then(d=>setOllamaStatus(d.ok?"ok":"fail"))
      .catch(()=>setOllamaStatus("fail"));
  }

  // Build a connection URL from the form fields
  function buildUrl(){
    if (dbType==="sqlite")  return `sqlite:///${filePath.trim()}`;
    if (dbType==="duckdb")  return filePath.trim() ? `duckdb:///${filePath.trim()}` : "duckdb://";
    const u = encodeURIComponent(user);
    const p = encodeURIComponent(password);
    const dialect = dbType==="mssql" ? "mssql+pyodbc" : dbType;
    const creds = (u && p) ? `${u}:${p}@` : u ? `${u}@` : "";
    return `${dialect}://${creds}${host.trim()}:${port}/${dbName.trim()}`;
  }

  // Turn raw SQLAlchemy / driver errors into friendly sentences
  function humanError(msg){
    const m=(msg||"").toLowerCase();
    if (m.includes("connection refused")||m.includes("could not connect to server")||m.includes("can't connect"))
      return "The database server isn't running or can't be reached — check the host and port.";
    if (m.includes("password authentication failed")||m.includes("access denied")||m.includes("login failed"))
      return "Wrong username or password — double-check your credentials.";
    if (m.includes("no such file")||m.includes("unable to open database file"))
      return "File not found — check the path and make sure the file exists.";
    if (m.includes("database") && (m.includes("does not exist")||m.includes("unknown database")))
      return "That database name wasn't found — check the spelling.";
    if (m.includes("timeout")||m.includes("timed out"))
      return "Connection timed out — the server may be unreachable or behind a firewall.";
    if (m.includes("ssl")||m.includes("certificate"))
      return "SSL error — if connecting via URL mode, try adding ?sslmode=disable at the end.";
    if (m.includes("no module named"))
      return "The driver for that database type isn't installed on this server.";
    return msg; // fall back to raw if nothing matches
  }

  function canConnect(){
    if (formMode){
      if (dbType==="duckdb") return true;                  // empty path = in-memory DuckDB
      if (isFileBased) return filePath.trim().length>0;    // SQLite needs a file
      return host.trim() && user.trim() && dbName.trim();
    }
    return dbUrl.trim().length>0;
  }

  async function go(kind){
    setConnecting(kind); setError("");
    try {
      await window.apiCall('/api/config',{provider:engine});
      let res;
      if (kind==="sample"){
        res = await window.apiCall('/api/connect-sample',{});
      } else {
        const url = formMode ? buildUrl() : dbUrl.trim();
        if (!url){ setError("Please fill in all required fields."); setConnecting(null); return; }
        res = await window.apiCall('/api/connect',{db_url:url});
      }
      onConnect(kind==="sample", res);
    } catch(e){
      setError(humanError(e.message)||"Connection failed — check your details and try again.");
      setConnecting(null);
    }
  }

  return (
    <div className="page" style={{overflowY:"auto"}}>
      <div style={{maxWidth:980,margin:"0 auto",padding:"46px 32px 60px"}}>

        {/* header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:42}}>
          <Logo size={30} sub/>
          <span className="chip" style={{cursor:"default",background:"var(--surface)",color:"var(--muted)",borderColor:"var(--border-2)"}}>
            <span style={{width:7,height:7,borderRadius:99,background:"var(--brand)"}} className="pulse"/> Running locally · localhost:4321
          </span>
        </div>

        {/* hero */}
        <div className="rise" style={{marginBottom:34}}>
          <h1 style={{fontSize:38,lineHeight:1.08,letterSpacing:"-.03em",margin:"0 0 12px",fontWeight:800,maxWidth:600,textWrap:"balance"}}>
            Ask your data in plain English.<br/><span style={{color:"var(--brand)"}}>Trust</span> the answer you get back.
          </h1>
          <p style={{fontSize:16.5,color:"var(--muted)",margin:0,maxWidth:560,lineHeight:1.55}}>
            Pick where the AI runs, connect your database, and start asking questions — no SQL knowledge needed.
          </p>
        </div>

        {/* step 1 — engine */}
        <Section num="1" title="Choose your AI engine" hint="You can switch anytime in Settings. Not sure? Start with Local — it's free and private.">
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {P.map((p,i)=>(
              <EngineCard key={p.id} p={p} active={engine===p.id} onClick={()=>{ setEngine(p.id); setError(""); }} delay={i*55}/>
            ))}
          </div>

          {/* Ollama status banners */}
          {engine==="ollama" && ollamaStatus==="loading" && (
            <div style={{display:"flex",alignItems:"center",gap:9,marginTop:12,padding:"12px 15px",
              background:"var(--surface-2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",color:"var(--muted)",fontSize:13.5}}>
              <Spinner/> Checking if Ollama is running on this machine…
            </div>
          )}
          {engine==="ollama" && ollamaStatus==="ok" && (
            <div style={{display:"flex",alignItems:"center",gap:9,marginTop:12,padding:"12px 15px",
              background:"var(--brand-tint)",borderRadius:"var(--radius-sm)",border:"1px solid var(--brand-tint-2)",
              color:"var(--brand-ink)",fontSize:13.5,fontWeight:600}}>
              <Ico.check style={{width:16,height:16,flexShrink:0}}/> Ollama is running and ready. Your questions will never leave this machine.
            </div>
          )}
          {engine==="ollama" && ollamaStatus==="fail" && (
            <div style={{marginTop:12,padding:"16px 18px",background:"#FFF8ED",border:"1px solid #F5D78A",
              borderRadius:"var(--radius)",color:"#7A5C0A",fontSize:13.5}}>
              <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:700,marginBottom:8}}>
                <Ico.bolt style={{width:16,height:16,flexShrink:0,color:"#C2891B"}}/> Ollama isn't running yet
              </div>
              <p style={{margin:"0 0 10px",fontWeight:500,lineHeight:1.6}}>
                Ollama is a free tool that lets AI run entirely on your computer — nothing leaves your machine.
                You need to install it before you can use the Local option.
              </p>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                <a href="https://ollama.com/download" target="_blank" rel="noopener"
                  style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 15px",
                    background:"var(--ink)",color:"#fff",borderRadius:"var(--radius-sm)",
                    fontWeight:700,fontSize:13,textDecoration:"none"}}>
                  <Ico.arrow style={{width:14,height:14}}/> Download Ollama (free)
                </a>
                <button onClick={recheckOllama}
                  style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 15px",
                    background:"transparent",border:"1.5px solid #C2891B",color:"#7A5C0A",
                    borderRadius:"var(--radius-sm)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  Check again
                </button>
              </div>
              <div style={{fontSize:12.5,fontWeight:550,opacity:.85,lineHeight:1.6}}>
                After installing Ollama: open a Terminal and run{" "}
                <code style={{background:"rgba(0,0,0,.09)",padding:"2px 6px",borderRadius:4,fontFamily:"var(--font-mono)"}}>ollama pull llama3.2</code>
                {" "}to download the model (~2 GB). Then click "Check again."
              </div>
              <div style={{marginTop:12,fontSize:12.5,fontWeight:600,opacity:.7}}>
                Prefer a cloud AI instead? Pick Claude, OpenAI, or Groq above — they don't require any installation.
              </div>
            </div>
          )}

          {/* API key hint for cloud providers */}
          {engine!=="ollama" && (
            <div style={{display:"flex",alignItems:"center",gap:9,marginTop:12,padding:"12px 15px",
              background:"var(--surface-2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",
              color:"var(--ink-2)",fontSize:13.5}}>
              <Ico.lock style={{flexShrink:0,width:16,height:16,color:"var(--muted)"}}/>
              <span style={{flex:1}}>
                You'll need an API key to use {P.find(p=>p.id===engine)?.name}.
                {" "}<a href={API_KEY_LINKS[engine]} target="_blank" rel="noopener"
                  style={{color:"var(--brand-ink)",fontWeight:700,textDecoration:"none"}}>
                  Get your key here →
                </a>
                {" "}<span style={{color:"var(--faint)",fontSize:12.5}}>(You'll enter it in Settings after connecting.)</span>
              </span>
            </div>
          )}

          <div style={{display:"flex",alignItems:"center",gap:9,marginTop:10,padding:"11px 15px",
            background:"var(--brand-tint)",border:"1px solid var(--brand-tint-2)",borderRadius:"var(--radius-sm)",
            color:"var(--brand-ink)",fontSize:13.5,fontWeight:500}}>
            <Ico.lock style={{flexShrink:0}}/> Even with a cloud engine, only your <b>database structure and your question</b> are sent — never your actual rows of data.
          </div>
        </Section>

        {/* step 2 — connect */}
        <Section num="2" title="Connect your database" hint="Don't have one yet? Use the sample data to see how it works first.">
          <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:16}}>

            {/* connection form card */}
            <div className="card" style={{padding:22}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:16,fontWeight:700,fontSize:15}}>
                <Ico.db style={{color:"var(--brand)"}}/> Your database
              </div>

              {/* DB type selector */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:8,letterSpacing:".05em",textTransform:"uppercase"}}>What type of database?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {DB_TYPES.map(dt=>(
                    <button key={dt.id} onClick={()=>{ setDbType(dt.id); if(dt.port) setPort(dt.port); setError(""); }}
                      className="focusable"
                      style={{padding:"6px 14px",borderRadius:99,cursor:"pointer",fontSize:13,fontWeight:650,transition:"all .15s",
                        background: dbType===dt.id?"var(--brand)":"var(--surface-2)",
                        color:       dbType===dt.id?"#fff":"var(--ink-2)",
                        border:      dbType===dt.id?"1.5px solid var(--brand)":"1.5px solid var(--border)"}}>
                      {dt.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Fields */}
              {formMode ? (
                isFileBased ? (
                  /* File-based: SQLite / DuckDB */
                  <div style={{marginBottom:14}}>
                    <label htmlFor="filePath" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>File path</label>
                    <input id="filePath" className="field mono" value={filePath} onChange={e=>setFilePath(e.target.value)}
                      placeholder={dbType==="sqlite" ? "/Users/you/data/mydb.db" : "/Users/you/data/mydb.duckdb"}
                      style={{fontSize:13.5,marginBottom:6}}/>
                    <div style={{fontSize:12,color:"var(--faint)",fontWeight:550}}>
                      The full path to your {dbType==="sqlite"?".db or .sqlite":"DuckDB"} file on disk.
                      {dbType==="duckdb" && " Leave empty to use an in-memory database."}
                    </div>
                  </div>
                ) : (
                  /* Network DB: PG / MySQL / MSSQL */
                  <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 90px",gap:10}}>
                      <div>
                        <label htmlFor="host" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Host</label>
                        <input id="host" className="field" value={host} onChange={e=>setHost(e.target.value)}
                          placeholder="localhost or db.company.com" style={{fontSize:14}}/>
                      </div>
                      <div>
                        <label htmlFor="port" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Port</label>
                        <input id="port" className="field" value={port} onChange={e=>setPort(e.target.value)}
                          placeholder={port} style={{fontSize:14}}/>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div>
                        <label htmlFor="user" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Username</label>
                        <input id="user" className="field" value={user} onChange={e=>setUser(e.target.value)}
                          placeholder="your_username" style={{fontSize:14}} autoComplete="username"/>
                      </div>
                      <div>
                        <label htmlFor="password" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Password</label>
                        <input id="password" className="field" type="password" value={password} onChange={e=>setPassword(e.target.value)}
                          placeholder="••••••••" style={{fontSize:14}} autoComplete="current-password"/>
                      </div>
                    </div>
                    <div>
                      <label htmlFor="dbName" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Database name</label>
                      <input id="dbName" className="field" value={dbName} onChange={e=>setDbName(e.target.value)}
                        placeholder="my_database" style={{fontSize:14}}/>
                    </div>
                  </div>
                )
              ) : (
                /* Raw URL mode */
                <div style={{marginBottom:14}}>
                  <label htmlFor="dbUrl" style={{display:"block",fontSize:11.5,fontWeight:700,color:"var(--faint)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Connection URL</label>
                  <input id="dbUrl" className="field mono"
                    placeholder={dbType==="sqlite"?"sqlite:///path/to/file.db":dbType==="mysql"?"mysql://user:pass@localhost:3306/db":"postgresql://user:pass@localhost:5432/db"}
                    value={dbUrl} onChange={e=>setDbUrl(e.target.value)} style={{fontSize:13,marginBottom:8}}/>
                  <button onClick={()=>setFormMode(true)}
                    style={{fontSize:12.5,color:"var(--brand-ink)",background:"none",border:"none",cursor:"pointer",fontWeight:650,padding:0}}>
                    ← Back to the simple form
                  </button>
                </div>
              )}

              {formMode && (
                <button onClick={()=>setFormMode(false)}
                  style={{fontSize:12.5,color:"var(--faint)",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:"0 0 16px 0",display:"block"}}>
                  Have a full connection URL? Use that instead →
                </button>
              )}

              <Button kind={canConnect()?"primary":"ghost"} className="btn-block"
                disabled={!canConnect()||!!connecting}
                onClick={()=>go("url")} icon={connecting==="url"?<Spinner/>:<Ico.db/>}>
                {connecting==="url"?"Connecting…":"Connect database"}
              </Button>
              <div style={{display:"flex",alignItems:"center",gap:7,marginTop:11,color:"var(--faint)",fontSize:12.5}}>
                <Ico.shield style={{width:14,height:14}}/> Tip: use a view-only database account — BoloDB never writes to your data.
              </div>
            </div>

            {/* sample data card */}
            <button onClick={()=>go("sample")} disabled={!!connecting}
              className="card focusable" style={{padding:22,textAlign:"left",cursor:connecting?"wait":"pointer",
              border:"1.5px dashed var(--brand)",background:"var(--brand-tint)",
              display:"flex",flexDirection:"column",justifyContent:"space-between",transition:"transform .15s var(--ease)"}}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
              onMouseLeave={e=>e.currentTarget.style.transform="none"}>
              <div>
                <div style={{width:40,height:40,borderRadius:12,background:"var(--brand)",color:"#fff",
                  display:"grid",placeItems:"center",marginBottom:14,boxShadow:"var(--shadow-brand)"}}>
                  {connecting==="sample"?<Spinner light/>:<Ico.spark/>}
                </div>
                <div style={{fontWeight:700,fontSize:16,color:"var(--brand-ink)",marginBottom:5}}>
                  {connecting==="sample"?"Building sample data…":"Try with sample data"}
                </div>
                <div style={{fontSize:13.5,color:"var(--brand-ink)",opacity:.85,lineHeight:1.55}}>
                  A realistic TechStore e-commerce database, built locally for you. No setup, no credentials, ready in seconds.
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:18,fontWeight:700,fontSize:13.5,color:"var(--brand-ink)"}}>
                Start in seconds <Ico.arrow/>
              </div>
            </button>
          </div>

          {error && (
            <div style={{marginTop:12,padding:"13px 17px",background:"var(--c-low-tint)",
              border:"1px solid #EBC6BD",borderRadius:"var(--radius)",color:"var(--c-low-ink)",
              fontSize:13.5,fontWeight:550,lineHeight:1.55}}>
              <b>Couldn't connect —</b> {error}
            </div>
          )}
        </Section>

      </div>
    </div>
  );
}

function Section({ num, title, hint, children }) {
  return (
    <div className="rise" style={{marginBottom:30,animationDelay:".05s"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:11,marginBottom:14}}>
        <span style={{width:24,height:24,borderRadius:8,background:"var(--ink)",color:"var(--surface)",
          display:"grid",placeItems:"center",fontSize:12.5,fontWeight:800,flexShrink:0,transform:"translateY(3px)"}}>{num}</span>
        <div>
          <h2 style={{margin:0,fontSize:19,fontWeight:700,letterSpacing:"-.02em"}}>{title}</h2>
          {hint && <p style={{margin:"3px 0 0",fontSize:13.5,color:"var(--faint)"}}>{hint}</p>}
        </div>
      </div>
      {children}
    </div>
  );
}

function EngineCard({ p, active, onClick, delay }) {
  return (
    <button onClick={onClick} className="focusable rise"
      style={{textAlign:"left",padding:"16px 15px",borderRadius:"var(--radius)",cursor:"pointer",
        background: active?"var(--surface)":"var(--surface-2)",
        border: active?"1.5px solid var(--brand)":"1.5px solid var(--border)",
        boxShadow: active?"0 0 0 4px var(--ring), var(--shadow)":"var(--shadow-sm)",
        transition:"all .18s var(--ease)",position:"relative",animationDelay:`${delay}ms`}}>
      {p.badge && (
        <span style={{position:"absolute",top:-8,right:10,fontSize:10.5,fontWeight:800,letterSpacing:".02em",
          padding:"3px 8px",borderRadius:99,
          background: p.tone==="brand"?"var(--brand)":"var(--ink)",color:"#fff"}}>{p.badge}</span>
      )}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{width:30,height:30,borderRadius:9,display:"grid",placeItems:"center",
          background: active?"var(--brand-tint)":"var(--surface-3)",color: active?"var(--brand)":"var(--muted)"}}>
          {p.id==="ollama"?<Ico.shield/>:<Ico.bolt/>}
        </span>
        <div>
          <div style={{fontWeight:700,fontSize:15,lineHeight:1.1}}>{p.name}</div>
          <div style={{fontSize:11.5,color:"var(--faint)",fontWeight:600}}>{p.sub}</div>
        </div>
      </div>
      <Meta label="Privacy" value={p.id==="ollama"?"Fully private":"No row data sent"} good={p.id==="ollama"}/>
      <Meta label="Cost" value={p.cost==='Pay per use'?'Metered':p.cost} good={p.cost==="Free"}/>
      <Meta label="Accuracy" value={p.accuracy.split("—")[0].split(",")[0].trim()}/>
    </button>
  );
}
function Meta({ label, value, good }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,fontSize:12,padding:"3px 0"}}>
      <span style={{color:"var(--faint)",fontWeight:600,flexShrink:0}}>{label}</span>
      <span style={{color: good?"var(--brand-ink)":"var(--ink-2)",fontWeight:650,fontSize:11.8,whiteSpace:"nowrap"}}>{value}</span>
    </div>
  );
}

function Spinner({ light }) {
  return <span className="spin" style={{width:16,height:16,borderRadius:99,
    border:`2.2px solid ${light?"rgba(255,255,255,.4)":"var(--border-2)"}`,
    borderTopColor: light?"#fff":"var(--brand)",display:"inline-block"}}/>;
}

Object.assign(window, { ConnectScreen, Spinner, Section });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — Onboarding crawl
   profile  ->  glossary  ->  verify starters
   ============================================================ */
function OnboardScreen({ onDone, dbInfo, schema }) {
  const [step,setStep] = React.useState("profile");
  const [realGlossary,setRealGlossary] = React.useState(null);
  const [realStarters,setRealStarters] = React.useState(null);
  const [confirmedGlossary,setConfirmedGlossary] = React.useState(null);
  const [loadErr,setLoadErr] = React.useState("");
  const B = window.BOLO;

  // Real DB chip — fallback to "Your database" if info not yet available
  const dbLabel = dbInfo
    ? (dbInfo.url||"").split("/").pop() || dbInfo.dialect || "Your database"
    : "Your database";
  const tableLabel = dbInfo ? `${dbInfo.tables} table${dbInfo.tables===1?"":"s"}` : "";

  async function loadOnboardData() {
    setLoadErr("");
    try {
      const [g, s] = await Promise.all([
        window.apiCall('/api/onboard/glossary',{}),
        window.apiCall('/api/onboard/starters',{})
      ]);
      setRealGlossary(g.glossary || []);
      setRealStarters(s.starters || []);
    } catch(e) {
      setLoadErr(e.message || "Couldn't reach the AI — using built-in examples instead.");
      // fall back to canned data so the user can still continue
      setRealGlossary(B.glossary);
      setRealStarters(B.starters);
    }
  }

  return (
    <div className="page" style={{overflowY:"auto"}}>
      <div style={{maxWidth:760,margin:"0 auto",padding:"40px 32px 60px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:30}}>
          <Logo size={26}/>
          <span className="chip" style={{cursor:"default",background:"var(--surface)",color:"var(--brand-ink)",borderColor:"var(--brand-tint-2)"}}>
            <Ico.db style={{width:14,height:14}}/> {dbLabel}{tableLabel ? ` · ${tableLabel}` : ""}
          </span>
        </div>

        <Stepper step={step}/>

        {/* LLM unavailable notice — shown after the profile step if AI couldn't be reached */}
        {loadErr && (
          <div style={{marginBottom:16,padding:"11px 15px",background:"#FFF8ED",border:"1px solid #F5D78A",
            borderRadius:"var(--radius-sm)",color:"#7A5C0A",fontSize:13,fontWeight:550,lineHeight:1.5}}>
            <b>AI not available:</b> {loadErr} The setup will continue with example data — you can re-run it later from Settings.
          </div>
        )}

        {step==="profile"  && <ProfileStep onNext={()=>{ loadOnboardData(); setStep("glossary"); }} schema={schema}/>}
        {step==="glossary" && <GlossaryStep glossaryItems={realGlossary || B.glossary} onNext={(g)=>{ setConfirmedGlossary(g); setStep("starters"); }}/>}
        {step==="starters" && <StartersStep starterItems={realStarters || B.starters} glossary={confirmedGlossary || []} onDone={onDone}/>}
      </div>
    </div>
  );
}

function Stepper({ step }) {
  const steps = [["profile","Read your DB"],["glossary","Define terms"],["starters","Check answers"]];
  const idx = steps.findIndex(s=>s[0]===step);
  return (
    <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:26}}>
      {steps.map((s,i)=>(
        <React.Fragment key={s[0]}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <span style={{width:26,height:26,borderRadius:99,display:"grid",placeItems:"center",
              fontSize:12.5,fontWeight:800,transition:"all .3s var(--ease)",
              background: i<=idx?"var(--brand)":"var(--surface-3)",
              color: i<=idx?"#fff":"var(--faint)",
              border: i<=idx?"none":"1px solid var(--border-2)"}}>
              {i<idx?<Ico.check style={{width:14,height:14}}/>:i+1}
            </span>
            <span style={{fontSize:13.5,fontWeight:650,color: i<=idx?"var(--ink)":"var(--faint)"}}>{s[1]}</span>
          </div>
          {i<steps.length-1 && <div style={{flex:1,height:2,margin:"0 12px",borderRadius:99,
            background: i<idx?"var(--brand)":"var(--border-2)",transition:"background .4s"}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ---- profile / crawl ---- */
function ProfileStep({ onNext, schema }) {
  const B = window.BOLO;
  // Use real schema if passed; otherwise fall back to TechStore demo
  const tableList = (schema && schema.length > 0) ? schema : B.schema;
  const [done,setDone] = React.useState(0);
  const allDone = done >= tableList.length;
  React.useEffect(()=>{
    if (done < tableList.length){
      const t=setTimeout(()=>setDone(d=>d+1), 360 + Math.random()*220);
      return ()=>clearTimeout(t);
    }
  },[done]);
  return (
    <div className="rise card" style={{padding:26}}>
      <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Getting to know your database</h2>
      <p style={{margin:"0 0 20px",color:"var(--muted)",fontSize:14.5}}>
        BoloDB is reading your table structure — column names, relationships, and what categories your data uses.
        Nothing is uploaded or sent anywhere.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {tableList.map((t,i)=>{
          const state = i<done?"done":i===done?"active":"wait";
          return (
            <div key={t.name} style={{display:"flex",alignItems:"center",gap:13,padding:"12px 15px",
              borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",
              background: state==="active"?"var(--brand-tint)":"var(--surface-2)",
              opacity: state==="wait"?.5:1,transition:"all .3s var(--ease)"}}>
              <span style={{width:26,height:26,borderRadius:8,display:"grid",placeItems:"center",flexShrink:0,
                background: state==="done"?"var(--brand)":state==="active"?"var(--surface)":"var(--surface-3)",
                color: state==="done"?"#fff":"var(--brand)",border:state==="active"?"1px solid var(--brand-tint-2)":"none"}}>
                {state==="done"?<Ico.check style={{width:15,height:15}}/>:state==="active"?<Spinner/>:<Ico.table/>}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                  <span className="mono" style={{fontWeight:700,fontSize:14,color:"var(--ink)"}}>{t.name}</span>
                  <span style={{fontSize:12,color:"var(--faint)",fontWeight:600}} className="tnum">{t.rows} rows</span>
                </div>
                <div className="mono" style={{fontSize:11.5,color:"var(--faint)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {t.cols.join(", ")}
                </div>
              </div>
              {state==="done" && <span style={{fontSize:12,fontWeight:700,color:"var(--brand-ink)"}}>linked</span>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:20}}>
        {allDone ? (
          <Button kind="primary" size="lg" iconRight={<Ico.arrow/>} onClick={onNext}>
            Looks good — continue
          </Button>
        ) : (
          <span style={{fontSize:13,color:"var(--faint)",fontWeight:550,display:"flex",alignItems:"center",gap:7}}>
            <Spinner/> Reading your database…
          </span>
        )}
      </div>
    </div>
  );
}

/* ---- glossary ---- */
function GlossaryStep({ onNext, glossaryItems }) {
  const B = window.BOLO;
  const items = glossaryItems && glossaryItems.length ? glossaryItems : B.glossary;
  const mkItem = (g) => g.def !== undefined ? g : {term:g.term, def:g.maps_to||g.def||"", maps_to:g.maps_to||"", alt:g.alt||[], sql_hint:g.sql_hint||""};
  const glossList = items.map(mkItem);
  const [choices,setChoices] = React.useState(glossList.map(()=>0)); // 0 = the proposed def
  function next(){
    const confirmed = glossList.map((g,gi)=>{
      const opts = [g.def||g.maps_to||"", ...(g.alt||[])];
      return {term:g.term, maps_to: opts[choices[gi]] ?? opts[0], sql_hint: g.sql_hint||""};
    });
    onNext(confirmed);
  }
  return (
    <div className="rise">
      <div className="card" style={{padding:26,marginBottom:16}}>
        <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Confirm what your terms mean</h2>
        <p style={{margin:"0 0 4px",color:"var(--muted)",fontSize:14.5}}>
          BoloDB guessed how a few business words map to your data. Confirm or correct them — this is what keeps
          answers in your language.
        </p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        {glossList.map((g,gi)=>(
          <div key={g.term} className="card rise" style={{padding:20,animationDelay:`${gi*70}ms`}}>
            <div style={{display:"flex",alignItems:"baseline",gap:9,marginBottom:13}}>
              <span style={{fontWeight:800,fontSize:16,letterSpacing:"-.01em",whiteSpace:"nowrap"}}>{g.term}</span>
              <span style={{fontSize:11.5,color:"var(--faint)",fontWeight:600}}>means…</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[g.def||g.maps_to||"",...(g.alt||[])].map((opt,oi)=>{
                const on = choices[gi]===oi;
                return (
                  <button key={oi} onClick={()=>setChoices(c=>c.map((v,i)=>i===gi?oi:v))}
                    className="focusable" style={{display:"flex",alignItems:"center",gap:11,textAlign:"left",
                      padding:"11px 14px",borderRadius:"var(--radius-sm)",cursor:"pointer",
                      background: on?"var(--brand-tint)":"var(--surface-2)",
                      border: on?"1.5px solid var(--brand)":"1.5px solid var(--border)",transition:"all .15s var(--ease)"}}>
                    <span style={{width:18,height:18,borderRadius:99,flexShrink:0,display:"grid",placeItems:"center",
                      border: on?"none":"2px solid var(--border-2)",background: on?"var(--brand)":"transparent"}}>
                      {on && <Ico.check style={{width:11,height:11,color:"#fff"}}/>}
                    </span>
                    <span style={{flex:1,fontSize:14,fontWeight: on?600:500,color: on?"var(--ink)":"var(--ink-2)"}}>{opt}</span>
                    {oi===0 && <span style={{fontSize:10.5,fontWeight:800,padding:"2px 7px",borderRadius:99,
                      background:"var(--surface-3)",color:"var(--faint)",letterSpacing:".03em"}}>SUGGESTED</span>}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:20}}>
        <Button kind="primary" size="lg" iconRight={<Ico.arrow/>} onClick={next}>Save terms &amp; verify answers</Button>
      </div>
    </div>
  );
}

/* ---- starters ---- */
function StartersStep({ onDone, starterItems, glossary }) {
  const B = window.BOLO;
  const starters = starterItems && starterItems.length ? starterItems : B.starters;
  const [ready,setReady] = React.useState(false);
  const [verdicts,setVerdicts] = React.useState(starters.map(()=>null));
  const [saving,setSaving]   = React.useState(false);
  const [saveErr,setSaveErr] = React.useState("");
  React.useEffect(()=>{ const t=setTimeout(()=>setReady(true),900); return ()=>clearTimeout(t); },[]);

  const verifiedCount = verdicts.filter(v=>v==="yes").length;
  const allAnswered = verdicts.every(v=>v!==null);
  function set(i,v){ setVerdicts(arr=>arr.map((x,j)=>j===i?v:x)); }

  async function saveAndFinish() {
    setSaving(true); setSaveErr("");
    try {
      const verified = starters
        .filter((_,i)=>verdicts[i]==="yes")
        .map(s=>({question:s.q||s.question||"",sql:s.sql||"",restatement:s.restatement||""}));
      await window.apiCall('/api/onboard/save',{glossary:glossary||[],starters:verified});
      onDone(verifiedCount);
    } catch(e) {
      setSaveErr("Couldn't save your answers — check that the server is still running, then try again.");
      setSaving(false);
    }
  }

  return (
    <div className="rise">
      <div className="card" style={{padding:26,marginBottom:16}}>
        <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Check a few answers before you start</h2>
        <p style={{margin:0,color:"var(--muted)",fontSize:14.5}}>
          BoloDB ran these questions against your database. Confirm the ones that look right — each one
          you approve becomes a reference answer that keeps future results accurate.
        </p>
      </div>

      {!ready ? (
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          {starters.map((s,i)=>(
            <div key={i} className="card" style={{padding:20}}>
              <div className="skel" style={{height:15,width:"55%",marginBottom:12}}/>
              <div className="skel" style={{height:13,width:"80%",marginBottom:8}}/>
              <div className="skel" style={{height:38,width:"100%"}}/>
            </div>
          ))}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          {starters.map((s,i)=>(
            <StarterCard key={i} s={s} verdict={verdicts[i]} onYes={()=>set(i,"yes")} onNo={()=>set(i,"no")} delay={i*90}/>
          ))}
        </div>
      )}

      {ready && (
        <div style={{marginTop:22}}>
          {saveErr && (
            <div style={{marginBottom:12,padding:"11px 15px",background:"var(--c-low-tint)",
              border:"1px solid #EBC6BD",borderRadius:"var(--radius-sm)",color:"var(--c-low-ink)",
              fontSize:13.5,fontWeight:550}}>{saveErr}</div>
          )}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"15px 20px",borderRadius:"var(--radius)",background:"var(--surface)",border:"1px solid var(--border)",boxShadow:"var(--shadow-sm)"}}>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <span style={{width:34,height:34,borderRadius:10,background:"var(--brand-tint)",color:"var(--brand)",display:"grid",placeItems:"center"}}><Ico.spark/></span>
              <div>
                <div style={{fontWeight:700,fontSize:14.5}}>{verifiedCount} answer{verifiedCount===1?"":"s"} confirmed</div>
                <div style={{fontSize:12.5,color:"var(--faint)"}}>
                  {verifiedCount>=3
                    ? "Great start — BoloDB will answer confidently from the beginning."
                    : "Mark at least a few as correct so BoloDB has something to go on."}
                </div>
              </div>
            </div>
            <Button kind="primary" size="lg" disabled={!allAnswered||saving} iconRight={saving?<Spinner/>:<Ico.arrow/>} onClick={saveAndFinish}>
              {saving?"Saving…":allAnswered?"Start asking →":"Review each answer above"}
            </Button>
          </div>
        </div>
      )}
    </div>
  );
}

function StarterCard({ s, verdict, onYes, onNo, delay }) {
  return (
    <div className="card rise" style={{padding:20,animationDelay:`${delay}ms`,
      borderColor: verdict==="yes"?"var(--brand-tint-2)":verdict==="no"?"#EBC6BD":"var(--border)",
      transition:"border-color .3s"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:11}}>
        <div style={{fontWeight:700,fontSize:15.5,letterSpacing:"-.01em",lineHeight:1.3}}>{s.q||s.question||""}</div>
        <span style={{fontSize:12.5,color:"var(--faint)",fontWeight:600,whiteSpace:"nowrap",flexShrink:0,display:"flex",alignItems:"center",gap:5}}><Ico.bolt style={{width:13,height:13,color:"var(--brand)"}}/>auto-run</span>
      </div>
      <div style={{marginBottom:13,padding:"11px 14px",
        background:"var(--surface-2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
        <div style={{fontSize:10.5,fontWeight:800,color:"var(--faint)",letterSpacing:".07em",marginBottom:5}}>WHAT I UNDERSTOOD</div>
        <div style={{fontSize:14,color:"var(--ink)",fontWeight:550,lineHeight:1.4}}>{s.restatement}</div>
      </div>
      <ResultTable columns={s.columns||[]} rows={window.rowsToArrays(s.columns||[], s.rows||[])} max={4}/>
      {/* SQL hidden by default — non-technical users don't need to see it */}
      <details style={{marginTop:8}}>
        <summary style={{fontSize:12,color:"var(--faint)",cursor:"pointer",fontWeight:600,listStyle:"none",display:"flex",alignItems:"center",gap:5}}>
          <Ico.code style={{width:13,height:13}}/> View technical details (SQL)
        </summary>
        <pre className="mono" style={{margin:"8px 0 0",padding:"12px 14px",background:"var(--surface-3)",
          border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:12,lineHeight:1.6,
          color:"var(--ink-2)",overflowX:"auto",whiteSpace:"pre"}}>{s.sql}</pre>
      </details>
      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:14}}>
        {verdict===null ? (
          <>
            <span style={{fontSize:13.5,fontWeight:650,color:"var(--muted)",marginRight:"auto",flex:1,lineHeight:1.4}}>
              Does the result table look correct?
            </span>
            <Button kind="ghost" size="sm" icon={<Ico.x style={{width:15,height:15}}/>} onClick={onNo}>Not quite</Button>
            <Button kind="primary" size="sm" icon={<Ico.check style={{width:15,height:15}}/>} onClick={onYes}>Yes, that's right</Button>
          </>
        ) : (
          <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:13.5,marginLeft:"auto",
            color: verdict==="yes"?"var(--brand-ink)":"var(--c-low-ink)"}}>
            {verdict==="yes"
              ? <><Ico.check style={{width:16,height:16}}/> Saved — this becomes a reference answer</>
              : <><Ico.x style={{width:16,height:16}}/> Skipped — noted, it won't be used</>}
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { OnboardScreen });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — AnswerCard (restatement + confidence + verify flow)
   ============================================================ */
const AnswerCard = React.memo(function AnswerCard({ turn, onVerify, isLatest }) {  // turn.query_id from API

  // turn: { id, question, restatement, confidence, reason, columns, rows, sql, basedOn, verdict, reasonChosen, thinking }
  const B = window.BOLO;
  const [showReasons,setShowReasons] = React.useState(false);
  const [justVerified,setJustVerified] = React.useState(false);

  function yes(){
    setJustVerified(true);
    onVerify(turn.id,"correct",null);
    setTimeout(()=>setJustVerified(false),1600);
  }
  function no(reason){
    setShowReasons(false);
    onVerify(turn.id,"wrong",reason);
  }

  return (
    <div className="rise" style={{marginBottom:26}}>
      {/* question bubble */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <div style={{maxWidth:"72%",padding:"11px 17px",borderRadius:"var(--radius-lg)",borderBottomRightRadius:7,
          background:"var(--ink)",color:"var(--surface)",fontSize:15,fontWeight:550,lineHeight:1.4,boxShadow:"var(--shadow-sm)"}}>
          {turn.question}
        </div>
      </div>

      {/* answer */}
      <div className="card" style={{padding:"20px 22px",borderTopLeftRadius:7,
        borderColor: turn.verdict==="correct"?"var(--brand-tint-2)":turn.verdict==="wrong"?"#EBC6BD":"var(--border)",
        transition:"border-color .4s",position:"relative",overflow:"hidden"}}>

        {justVerified && <Flywheel/>}

        {turn.thinking ? <Thinking confidenceHint={turn.confidence}/> : (
          <>
            {/* restatement + confidence */}
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14,marginBottom:15}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:800,color:"var(--faint)",letterSpacing:".07em",marginBottom:6}}>WHAT I UNDERSTOOD</div>
                <div style={{fontSize:16.5,fontWeight:600,letterSpacing:"-.01em",lineHeight:1.4,color:"var(--ink)",textWrap:"pretty"}}>{turn.restatement}</div>
                {turn.basedOn && (
                  <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:9,fontSize:12.5,fontWeight:650,
                    color:"var(--brand-ink)",background:"var(--brand-tint)",padding:"4px 10px",borderRadius:99}}>
                    <Ico.history style={{width:13,height:13}}/> Based on an answer you verified before
                  </div>
                )}
              </div>
              <div style={{flexShrink:0}}>
                <ConfidenceBadge level={turn.confidence} reason={turn.reason}/>
              </div>
            </div>

            {/* Execution error — shown instead of results when query failed */}
            {turn.executionError ? (
              <div style={{padding:"14px 16px",background:"var(--c-low-tint)",border:"1px solid #EBC6BD",
                borderRadius:"var(--radius-sm)",marginBottom:14,fontSize:13.5,lineHeight:1.55,color:"var(--c-low-ink)"}}>
                <div style={{fontWeight:700,marginBottom:4}}>The query ran into a problem</div>
                <div style={{fontWeight:500,marginBottom:8}}>
                  BoloDB generated a query but your database couldn't execute it — this sometimes happens when a
                  column or table name wasn't matched correctly.
                </div>
                <div style={{fontSize:12.5,fontWeight:600,opacity:.75}}>
                  Try rephrasing your question, naming a specific table or metric, or ask again with more context.
                </div>
              </div>
            ) : null}

            {/* Confidence context hint (not shown on execution error or high confidence with no note) */}
            {!turn.executionError && turn.confidence!=="high" && turn.reason && (
              <div style={{fontSize:13,color:"var(--muted)",marginBottom:14,marginTop:-6,lineHeight:1.5,
                display:"flex",alignItems:"flex-start",gap:7}}>
                <Ico.flask style={{width:14,height:14,flexShrink:0,marginTop:2,color:"var(--c-med)"}}/>{cap(turn.reason)}
              </div>
            )}
            {!turn.executionError && turn.confidence==="low" && !turn.basedOn && (
              <div style={{fontSize:12.5,color:"var(--c-med-ink)",background:"var(--c-med-tint)",
                padding:"8px 12px",borderRadius:"var(--radius-sm)",marginBottom:14,fontWeight:600}}>
                If the result looks right, click "Yes, correct" below — that trains BoloDB for next time.
              </div>
            )}

            {!turn.executionError && <ResultTable columns={turn.columns} rows={turn.rows}/>}
            <SqlBlock sql={turn.sql}/>

            {/* verify zone — hidden when the query failed to execute, so a
                broken query can never be saved as a verified ("correct") example */}
            {!turn.executionError && <div className="hr" style={{margin:"16px 0 14px"}}/>}
            {!turn.executionError && turn.verdict==null && !showReasons && (
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div style={{flex:1}}>
                  <span style={{fontSize:13.5,fontWeight:650,color:"var(--ink-2)",display:"flex",alignItems:"center",gap:7}}>
                    <Ico.shield style={{width:15,height:15,color:"var(--brand)"}}/> Was this the answer you were looking for?
                  </span>
                  {isLatest && (
                    <div style={{fontSize:11.5,color:"var(--faint)",marginTop:4,fontWeight:550}}>
                      Telling us keeps BoloDB accurate — verified answers become examples for future questions.
                    </div>
                  )}
                </div>
                <Button kind="ghost" size="sm" icon={<Ico.x style={{width:15,height:15}}/>} onClick={()=>setShowReasons(true)}>No</Button>
                <Button kind="primary" size="sm" icon={<Ico.check style={{width:15,height:15}}/>} onClick={yes}>Yes, correct</Button>
              </div>
            )}

            {!turn.executionError && turn.verdict==null && showReasons && (
              <div className="rise">
                <div style={{fontSize:13.5,fontWeight:700,marginBottom:10,color:"var(--ink)"}}>Thanks — what was off? <span style={{fontWeight:500,color:"var(--faint)"}}>(this is the most useful signal)</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {B.wrongReasons.map(r=>(
                    <button key={r.id} className="chip" onClick={()=>no(r.label)}>{r.label}</button>
                  ))}
                  <button className="chip" style={{borderStyle:"dashed",color:"var(--faint)"}} onClick={()=>setShowReasons(false)}>Cancel</button>
                </div>
              </div>
            )}

            {turn.verdict==="correct" && (
              <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:700,fontSize:13.5,color:"var(--brand-ink)"}}>
