                <span style={{width:22,height:22,borderRadius:99,background:"var(--brand)",color:"#fff",display:"grid",placeItems:"center"}}><Ico.check style={{width:14,height:14}}/></span>
                Verified — saved to this database's knowledge so similar questions get easier.
              </div>
            )}
            {turn.verdict==="wrong" && (
              <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:650,fontSize:13.5,color:"var(--c-low-ink)"}}>
                <span style={{width:22,height:22,borderRadius:99,background:"var(--c-low-tint)",color:"var(--c-low-ink)",display:"grid",placeItems:"center"}}><Ico.x style={{width:14,height:14}}/></span>
                Logged as “{turn.reasonChosen}.” That failure is captured, not discarded.
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
});

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }

/* thinking state — pipeline shimmer */
function Thinking({ confidenceHint }) {
  const steps = ["Finding the tables that matter","Reading verified examples","Writing the query","Running it on your data"];
  const [active,setActive] = React.useState(0);
  React.useEffect(()=>{
    if (active<steps.length-1){ const t=setTimeout(()=>setActive(a=>a+1),360); return ()=>clearTimeout(t); }
  },[active]);
  return (
    <div style={{padding:"4px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
        <Spinner/><span style={{fontWeight:650,fontSize:14.5,color:"var(--muted)"}}>Working through it…</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:9,fontSize:13,
            color: i<=active?"var(--ink-2)":"var(--faint)",opacity:i<=active?1:.5,transition:"all .3s"}}>
            <span style={{width:16,height:16,borderRadius:99,flexShrink:0,display:"grid",placeItems:"center",
              background:i<active?"var(--brand)":"transparent",border:i<active?"none":"1.5px solid var(--border-2)"}}>
              {i<active && <Ico.check style={{width:10,height:10,color:"#fff"}}/>}
            </span>
            {s}
          </div>
        ))}
      </div>
    </div>
  );
}

/* flywheel flourish on verify */
function Flywheel(){
  return (
    <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:3,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(420px 180px at 80% 0%, var(--brand-tint) 0%, transparent 70%)",animation:"fadein .3s ease both, fadeout .5s ease 1s both"}}/>
      {Array.from({length:7}).map((_,i)=>(
        <span key={i} style={{position:"absolute",top:"22px",right:`${30+i*8}%`,width:6,height:6,borderRadius:99,
          background:"var(--brand)",animation:`spark .9s var(--spring) ${i*40}ms both`}}/>
      ))}
      <style>{`@keyframes fadeout{to{opacity:0}}@keyframes spark{0%{opacity:0;transform:translateY(8px) scale(.4)}40%{opacity:1}100%{opacity:0;transform:translateY(-26px) scale(1)}}`}</style>
    </div>
  );
}

Object.assign(window, { AnswerCard });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — Ask screen (sidebar + conversation + input + settings)
   ============================================================ */
function AskScreen({ engine, setEngine, modelName, setModelName, verifiedCount, onVerify, onUpdateStarters, toast, realSchema, dbInfo, starters, onDisconnect }) {
  const B = window.BOLO;
  const dbLabel = dbInfo ? (dbInfo.url||"").split("/").pop()||dbInfo.dialect||"your database" : "your database";
  const tableCount = dbInfo ? dbInfo.tables : 0;
  const [turns,setTurns] = React.useState([]);
  const [input,setInput] = React.useState("");
  const [settingsOpen,setSettingsOpen] = React.useState(false);
  const [loading,setLoading] = React.useState(false);
  const feedRef = React.useRef(null);

  React.useEffect(()=>{
    if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
  },[turns]);

  async function ask(text){
    const q = (text||input).trim();
    if (!q) return;
    setInput(""); setLoading(true);
    const id = Math.random().toString(36).slice(2,10);
    setTurns(t=>[...t,{id,question:q,thinking:true}]);
    try {
      const data = await window.apiCall('/api/query',{question:q});
      const rows2d = window.rowsToArrays(data.columns||[], data.rows||[]);
      setTurns(t=>t.map(x=>x.id===id?{...x,thinking:false,
        restatement:data.restatement||"",
        sql:data.sql||"",
        columns:data.columns||[],
        rows:rows2d,
        confidence:data.confidence||"medium",
        reason:data.confidence_reason||"",
        basedOn:data.based_on_verified||false,
        query_id:data.query_id||id,
        executionError:data.execution_error||null,
        verdict:null}:x));
    } catch(e) {
      setTurns(t=>t.map(x=>x.id===id?{...x,thinking:false,
        restatement:"Something went wrong — please try again.",
        sql:"",columns:[],rows:[],confidence:"low",
        reason:e.message||"Request failed",basedOn:false,
        query_id:id,verdict:null}:x));
    } finally { setLoading(false); }
  }

    const turnsRef = React.useRef(turns);
  React.useEffect(() => { turnsRef.current = turns; }, [turns]);

  const handleVerify = React.useCallback(async (turnId, verdict, reasonChosen) => {
    setTurns(t=>t.map(x=>x.id===turnId?{...x,verdict,reasonChosen}:x));
    const turn = turnsRef.current.find(x=>x.id===turnId);
    try {
      const r = await window.apiCall('/api/feedback',{
        query_id:turn?.query_id||"", verdict, reason:reasonChosen||"",
        question:turn?.question||"", sql:turn?.sql||"", restatement:turn?.restatement||""});
      if (verdict==="correct") {
        if (r.trust) onVerify(r.trust.verified);
        else onVerify();
        // Update starter chips so newly verified questions appear immediately
        if (r.starters) onUpdateStarters(r.starters);
      }
    } catch(e) {
      // Feedback didn't persist on the server — revert the optimistic verdict
      // so client trust stays aligned with the server and the user can retry.
      setTurns(t=>t.map(x=>x.id===turnId?{...x,verdict:null,reasonChosen:null}:x));
    }
  }, [onVerify, onUpdateStarters]);

  const trust = B.trustFor(verifiedCount);

  return (
    <div className="page" style={{display:"flex",height:"100%"}}>
      <Sidebar engine={engine} modelName={modelName} verifiedCount={verifiedCount} onSettings={()=>setSettingsOpen(true)} schema={realSchema} dbInfo={dbInfo}/>

      {/* main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,position:"relative"}}>
        {/* top bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 28px",
          borderBottom:"1px solid var(--border)",background:"color-mix(in srgb, var(--surface) 70%, transparent)",backdropFilter:"blur(8px)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{width:30,height:30,borderRadius:9,background:"var(--brand-tint)",color:"var(--brand)",display:"grid",placeItems:"center"}}><Ico.db/></span>
            <div>
              <div style={{fontWeight:700,fontSize:14.5,lineHeight:1.1}}>{dbLabel}</div>
              <div style={{fontSize:11.5,color:"var(--faint)",fontWeight:600}}>{tableCount>0?`${tableCount} table${tableCount===1?"":"s"} · `:""}view only</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <TrustPill level={trust} count={verifiedCount}/>
            {turns.length>0 && <Button kind="quiet" size="sm" icon={<Ico.plus/>} onClick={()=>setTurns([])}>New conversation</Button>}
          </div>
        </div>

        {/* feed */}
        <div ref={feedRef} style={{flex:1,overflowY:"auto",padding:"28px 28px 8px"}}>
          <div style={{maxWidth:720,margin:"0 auto"}}>
            {turns.length===0 ? <Empty trust={trust} onPick={ask} starters={starters}/> :
              turns.map((t,i)=>(
                <AnswerCard key={t.id} turn={t} isLatest={i===turns.length-1}
                  onVerify={handleVerify}/>
              ))}
          </div>
        </div>

        {/* input */}
        <div style={{padding:"14px 28px 20px",borderTop:"1px solid var(--border)",background:"var(--surface)"}}>
          <div style={{maxWidth:720,margin:"0 auto"}}>
            <form onSubmit={e=>{e.preventDefault();ask();}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"7px 7px 7px 18px",
                border:"1.5px solid var(--border-2)",borderRadius:"var(--radius-lg)",background:"var(--surface)",
                boxShadow:"var(--shadow-sm)",transition:"border-color .15s, box-shadow .15s"}}
              onFocus={e=>{e.currentTarget.style.borderColor="var(--brand)";e.currentTarget.style.boxShadow="0 0 0 4px var(--ring)";}}
              onBlur={e=>{e.currentTarget.style.borderColor="var(--border-2)";e.currentTarget.style.boxShadow="var(--shadow-sm)";}}>
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Ask anything about your data…" aria-label="Ask a question about your data"
                style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:15.5,color:"var(--ink)"}}/>
              <Button kind="primary" type="submit" disabled={!input.trim()||loading} icon={loading?<Spinner/>:<Ico.send/>}>Ask</Button>
            </form>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginTop:10,fontSize:12,color:"var(--faint)"}}>
              <Ico.lock style={{width:13,height:13}}/> {engine==="ollama"?"Running on your machine — nothing leaves this device.":"Only the schema and your question are sent to generate SQL."}
            </div>
          </div>
        </div>

        {toast && <TrustToast toast={toast}/>}
      </div>

      {settingsOpen && <Settings engine={engine} setEngine={setEngine} modelName={modelName} setModelName={setModelName} onClose={()=>setSettingsOpen(false)} onDisconnect={onDisconnect}/>}
    </div>
  );
}

/* ---------- empty state ---------- */
function Empty({ trust, onPick, starters }) {
  const hasStarters = starters && starters.length > 0;
  return (
    <div className="rise" style={{paddingTop:34,textAlign:"center"}}>
      <div style={{width:54,height:54,borderRadius:16,background:"var(--brand)",color:"#fff",display:"grid",placeItems:"center",margin:"0 auto 18px",boxShadow:"var(--shadow-brand)"}}>
        <Ico.spark style={{width:26,height:26}}/>
      </div>
      <h2 style={{fontSize:25,fontWeight:800,letterSpacing:"-.025em",margin:"0 0 8px"}}>What would you like to know?</h2>
      <p style={{fontSize:15,color:"var(--muted)",margin:"0 auto 24px",maxWidth:440,lineHeight:1.55}}>
        Type any question about your data in plain English. BoloDB will answer it and explain how confident it is.
      </p>

      {hasStarters ? (
        <>
          <div style={{fontSize:12.5,color:"var(--brand-ink)",fontWeight:700,marginBottom:12,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Ico.history style={{width:13,height:13}}/> Questions verified for this database:
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:9,justifyContent:"center",maxWidth:580,margin:"0 auto"}}>
            {starters.map(s=>(
              <button key={s} className="chip" onClick={()=>onPick(s)} style={{fontWeight:550,textAlign:"left"}}>
                <Ico.arrow style={{width:14,height:14,color:"var(--brand)",flexShrink:0}}/>{s}
              </button>
            ))}
          </div>
          <p style={{fontSize:12.5,color:"var(--faint)",marginTop:20,lineHeight:1.5}}>
            Click any question above to run it, or type your own below.
          </p>
        </>
      ) : (
        <div style={{padding:"20px 24px",borderRadius:"var(--radius)",background:"var(--surface-2)",
          border:"1px dashed var(--border-2)",maxWidth:480,margin:"0 auto",textAlign:"left"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"var(--ink-2)"}}>Not sure where to start? Try asking:</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {["What tables does my database have?",
              "How many rows are in each table?",
              "Show me the most recent 10 entries",
              "What are the unique values in [a column name]?"].map(s=>(
              <button key={s} className="chip" onClick={()=>onPick(s)}
                style={{fontWeight:550,textAlign:"left",justifyContent:"flex-start",width:"100%"}}>
                <Ico.arrow style={{width:14,height:14,color:"var(--brand)",flexShrink:0}}/>{s}
              </button>
            ))}
          </div>
          <p style={{fontSize:12,color:"var(--faint)",marginTop:12,marginBottom:0,lineHeight:1.5}}>
            As you verify answers, questions specific to your data will appear here.
          </p>
        </div>
      )}
    </div>
  );
}

/* ---------- sidebar ---------- */
function Sidebar({ engine, modelName, verifiedCount, onSettings, schema, dbInfo }) {
  const B = window.BOLO;
  const trust = B.trustFor(verifiedCount);
  const prov = B.providers.find(p=>p.id===engine);
  const [openTable,setOpenTable] = React.useState(null);
  const schemaData = schema || B.schema;
  const dbLabel = dbInfo ? (dbInfo.url||"").split("/").pop()||dbInfo.dialect||"your database" : "your database";
  const tableCount = dbInfo ? dbInfo.tables : 0;
  return (
    <div style={{width:286,flexShrink:0,borderRight:"1px solid var(--border)",background:"var(--surface)",
      display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"18px 20px 14px"}}><Logo size={26}/></div>

      {/* trust panel */}
      <div style={{margin:"0 16px 14px",padding:16,borderRadius:"var(--radius)",
        background:"linear-gradient(165deg, var(--brand-tint), var(--surface-2))",border:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:11}}>
          <Ico.shield style={{width:16,height:16,color:"var(--brand)"}}/>
          <span style={{fontSize:12,fontWeight:800,letterSpacing:".04em",color:"var(--brand-ink)",textTransform:"uppercase",whiteSpace:"nowrap"}}>Accuracy</span>
          <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"var(--faint)"}}>{verifiedCount} verified</span>
        </div>
        <TrustMeter count={verifiedCount}/>
        <p style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.5,margin:"11px 0 0"}}>{trust.behaviour}</p>
        {trust.next && (
          <div style={{marginTop:10,padding:"9px 11px",background:"rgba(255,255,255,.6)",borderRadius:"var(--radius-sm)",
            fontSize:12,color:"var(--brand-ink)",fontWeight:600,lineHeight:1.5}}>
            Verify {trust.next-verifiedCount} more correct answer{trust.next-verifiedCount===1?"":"s"} and BoloDB will{" "}
            {trust.key==="supervised"
              ? "start showing confident answers directly without waiting."
              : "answer all questions directly — reasoning one tap away."}
          </div>
        )}
        {!trust.next && (
          <div style={{marginTop:10,padding:"9px 11px",background:"rgba(255,255,255,.6)",borderRadius:"var(--radius-sm)",
            fontSize:12,color:"var(--brand-ink)",fontWeight:600}}>
            ✓ BoloDB is fully calibrated for this database.
          </div>
        )}
      </div>

      {/* schema */}
      <div style={{flex:1,overflowY:"auto",padding:"2px 16px 10px"}}>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:".06em",color:"var(--faint)",margin:"6px 6px 9px",textTransform:"uppercase",display:"flex",alignItems:"center",gap:6}}>
          <Ico.table style={{width:13,height:13}}/> Schema
        </div>
        {schemaData.map(t=>(
          <div key={t.name} style={{marginBottom:3}}>
            <button onClick={()=>setOpenTable(o=>o===t.name?null:t.name)}
              style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 9px",borderRadius:"var(--radius-xs)",
                border:"none",background: openTable===t.name?"var(--surface-3)":"transparent",cursor:"pointer",textAlign:"left",transition:"background .12s"}}
              onMouseEnter={e=>{if(openTable!==t.name)e.currentTarget.style.background="var(--surface-2)";}}
              onMouseLeave={e=>{if(openTable!==t.name)e.currentTarget.style.background="transparent";}}>
              <Ico.caret style={{width:12,height:12,color:"var(--faint)",transform:openTable===t.name?"none":"rotate(-90deg)",transition:"transform .15s",flexShrink:0}}/>
              <span className="mono" style={{fontSize:13,fontWeight:650,color:"var(--ink)",flex:1}}>{t.name}</span>
              <span style={{fontSize:10.5,color:"var(--faint)",fontWeight:600}} className="tnum">{t.rows}</span>
            </button>
            {openTable===t.name && (
              <div className="rise" style={{padding:"2px 0 6px 27px"}}>
                {t.cols.map(c=>(
                  <div key={c} className="mono" style={{fontSize:11.5,color:"var(--muted)",padding:"3px 0",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:4,height:4,borderRadius:99,background:c.includes("PK")?"var(--brand)":c.includes("→")?"var(--c-med)":"var(--border-2)"}}/>
                    {c}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* engine + settings */}
      <div style={{padding:"12px 16px 16px",borderTop:"1px solid var(--border)"}}>
        <button onClick={onSettings} className="focusable" style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"11px 12px",
          borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface-2)",cursor:"pointer",transition:"all .15s",textAlign:"left"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--faint)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
          <span style={{width:30,height:30,borderRadius:8,flexShrink:0,display:"grid",placeItems:"center",
            background: engine==="ollama"?"var(--brand-tint)":"var(--surface-3)",color:engine==="ollama"?"var(--brand)":"var(--muted)"}}>
            {engine==="ollama"?<Ico.shield/>:<Ico.bolt/>}
          </span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>{prov.name}
              {engine==="ollama" && <span style={{fontSize:10,fontWeight:700,color:"var(--brand)"}}>private</span>}
            </div>
            <div className="mono" style={{fontSize:11,color:"var(--faint)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{modelName||prov.model}</div>
          </div>
          <Ico.gear style={{color:"var(--faint)",flexShrink:0}}/>
        </button>
      </div>
    </div>
  );
}

function TrustPill({ level, count }) {
  const tints = { supervised:["var(--c-med-tint)","var(--c-med-ink)","var(--c-med)"], assisted:["var(--brand-tint)","var(--brand-ink)","var(--brand)"], trusted:["var(--brand-tint)","var(--brand-ink)","var(--brand)"] };
  const [bg,fg,dot] = tints[level.key];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:7,padding:"6px 13px",borderRadius:99,whiteSpace:"nowrap",
      background:bg,color:fg,fontSize:12.5,fontWeight:700,border:"1px solid color-mix(in srgb, "+dot+" 25%, transparent)"}}>
      <span style={{width:7,height:7,borderRadius:99,background:dot}}/>{level.label}
      <span style={{opacity:.6}} className="tnum">· {count}</span>
    </span>
  );
}

/* ---------- trust level-up toast ---------- */
function TrustToast({ toast }) {
  return (
    <div style={{position:"absolute",bottom:96,left:"50%",transform:"translateX(-50%)",zIndex:20,
      animation:"toastIn .5s var(--spring) both"}}>
      <div style={{display:"flex",alignItems:"center",gap:13,padding:"14px 20px",borderRadius:"var(--radius-lg)",
        background:"var(--ink)",color:"var(--surface)",boxShadow:"var(--shadow-lg)"}}>
        <span style={{width:38,height:38,borderRadius:11,background:"var(--brand)",display:"grid",placeItems:"center",flexShrink:0}}><Ico.shield style={{width:20,height:20}}/></span>
        <div>
          <div style={{fontWeight:800,fontSize:15}}>{toast.title}</div>
          <div style={{fontSize:12.5,opacity:.75}}>{toast.body}</div>
        </div>
      </div>
      <style>{`@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px) scale(.95)}to{opacity:1;transform:translate(-50%,0) scale(1)}}`}</style>
    </div>
  );
}

/* ---------- settings modal ---------- */
function Settings({ engine, setEngine, modelName, setModelName, onClose, onDisconnect }) {
  const B = window.BOLO;
  const [sel,setSel] = React.useState(engine);
  const [localModel,setLocalModel] = React.useState(modelName||"llama3.2");
  const [apiKey,setApiKey] = React.useState("");
  const [saving,setSaving] = React.useState(false);
  const [error,setError] = React.useState("");
  const prov = B.providers.find(p=>p.id===sel);

  async function save(){
    setSaving(true); setError("");
    try {
      await window.apiCall('/api/config',{provider:sel, model:sel==="ollama"?localModel:"",
        api_key: sel!=="ollama"?(apiKey||undefined):undefined});
      setEngine(sel);
      setModelName(sel==="ollama"?localModel:"");
      onClose();
    } catch(e) {
      setError(e.message || "Could not save settings.");
      setSaving(false);
    }
  }

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:50,background:"rgba(20,28,24,.4)",
      backdropFilter:"blur(3px)",display:"grid",placeItems:"center",animation:"fadein .2s ease both",padding:24}}>
      <div onClick={e=>e.stopPropagation()} className="card" style={{width:560,maxWidth:"100%",padding:0,overflow:"hidden",animation:"pop .25s var(--spring) both"}}>
        <div style={{padding:"20px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Ico.gear style={{color:"var(--brand)"}}/><span style={{fontWeight:800,fontSize:17}}>Settings</span>
          </div>
          <button onClick={onClose} aria-label="Close settings" className="btn btn-quiet btn-sm" style={{padding:8}}><Ico.x/></button>
        </div>
        <div style={{padding:24}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--ink-2)",marginBottom:12}}>AI engine</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {B.providers.map(p=>(
              <button key={p.id} onClick={()=>setSel(p.id)} className="focusable"
                style={{display:"flex",alignItems:"center",gap:10,padding:"12px 13px",borderRadius:"var(--radius-sm)",cursor:"pointer",textAlign:"left",
                  background: sel===p.id?"var(--brand-tint)":"var(--surface-2)",
                  border: sel===p.id?"1.5px solid var(--brand)":"1.5px solid var(--border)",transition:"all .15s"}}>
                <span style={{width:30,height:30,borderRadius:8,flexShrink:0,display:"grid",placeItems:"center",
                  background:sel===p.id?"var(--surface)":"var(--surface-3)",color:p.id==="ollama"?"var(--brand)":"var(--muted)"}}>
                  {p.id==="ollama"?<Ico.shield/>:<Ico.bolt/>}</span>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13.5}}>{p.name}</div>
                  <div style={{fontSize:11,color:"var(--faint)",fontWeight:600}}>{p.cost}</div>
                </div>
              </button>
            ))}
          </div>

          {sel==="ollama" ? (
            <div>
              <label htmlFor="localModel" style={{display:"block",fontSize:13,fontWeight:700,color:"var(--ink-2)",marginBottom:8}}>Local model</label>
              <select id="localModel" className="field" value={localModel} onChange={e=>setLocalModel(e.target.value)} style={{cursor:"pointer",fontSize:14}}>
                <option value="qwen2.5:0.5b">Fast &amp; lightweight — lower accuracy (qwen2.5:0.5b, ~1 GB)</option>
                <option value="llama3.2">Balanced — recommended for most uses (llama3.2, ~4 GB)</option>
                <option value="mistral">Best accuracy — slower to respond (mistral, ~8 GB)</option>
              </select>
              <div style={{fontSize:12,color:"var(--faint)",marginTop:7,fontWeight:550}}>
                Not sure? Stay with "Balanced" — it works well for most databases.
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"10px 13px",background:"var(--brand-tint)",borderRadius:"var(--radius-sm)",color:"var(--brand-ink)",fontSize:12.5,fontWeight:550}}>
                <Ico.shield style={{width:15,height:15,flexShrink:0}}/> Fully private — your schema and questions never leave this machine.
              </div>
            </div>
          ) : (
            <div>
              <label htmlFor="apiKey" style={{display:"block",fontSize:13,fontWeight:700,color:"var(--ink-2)",marginBottom:8}}>{prov.name} API key</label>
              <input id="apiKey" className="field mono" type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder={sel==="claude"?"sk-ant-•••":sel==="openai"?"sk-•••":"gsk_•••"} style={{fontSize:13.5}}/>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12,padding:"10px 13px",background:"var(--c-med-tint)",borderRadius:"var(--radius-sm)",color:"var(--c-med-ink)",fontSize:12.5,fontWeight:550}}>
                <Ico.lock style={{width:15,height:15,flexShrink:0}}/> Stored locally only. Schema + question are sent to {prov.name} to generate SQL — never your table data.
              </div>
            </div>
          )}
        </div>
        {error && (
          <div style={{margin:"0 24px 16px",padding:"11px 15px",background:"var(--c-low-tint)",border:"1px solid #EBC6BD",borderRadius:"var(--radius-sm)",color:"var(--c-low-ink)",fontSize:13.5,fontWeight:550}}>{error}</div>
        )}
        <div style={{padding:"16px 24px",borderTop:"1px solid var(--border)",background:"var(--surface-2)"}}>
          {onDisconnect && (
            <div style={{marginBottom:14,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
              <div style={{fontSize:12.5,color:"var(--faint)",marginBottom:8,fontWeight:550}}>
                Want to connect a different database?
              </div>
              <button onClick={onDisconnect}
                style={{fontSize:13,color:"var(--c-low-ink)",background:"none",border:"1px solid #EBC6BD",
                  borderRadius:"var(--radius-sm)",padding:"7px 14px",cursor:"pointer",fontWeight:650}}>
                Disconnect &amp; change database
              </button>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <Button kind="ghost" onClick={onClose}>Cancel</Button>
            <Button kind="primary" disabled={saving} onClick={save} icon={saving?<Spinner/>:<Ico.check style={{width:16,height:16}}/>}>{saving?"Saving…":"Save changes"}</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { AskScreen });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — App (state machine + mount)
   ============================================================ */
function App(){
  const [phase,setPhase] = React.useState("loading"); // loading|connect|onboard|ask
  const [engine,setEngine] = React.useState("ollama");
  const [modelName,setModelName] = React.useState("");
  const [verifiedCount,setVerifiedCount] = React.useState(0);
  const [toast,setToast] = React.useState(null);
  const [realSchema,setRealSchema] = React.useState(null);
  const [dbInfo,setDbInfo] = React.useState(null);
  const [starters,setStarters] = React.useState([]);
  const prevLevel = React.useRef(window.BOLO.trustFor(0).key);

  // On mount: check if already connected (restore last session)
  React.useEffect(()=>{
    (async()=>{
      try {
        const s = await window.apiCall('/api/state');
        if (s.connected) {
          setEngine(s.config?.provider||"ollama");
          setModelName(s.config?.model||"");
          setVerifiedCount(s.trust?.verified||0);
          setDbInfo(s.database||null);
          setStarters(s.starters||[]);
          prevLevel.current = window.BOLO.trustFor(s.trust?.verified||0).key;
          // Load schema for sidebar
          try {
            const schema = await window.apiCall('/api/schema');
            setRealSchema(schemaObjToDisplay(schema));
          } catch(e) {}
          setPhase("ask");
        } else {
          setPhase("connect");
        }
      } catch(e) { setPhase("connect"); }
    })();
  },[]);

  function schemaObjToDisplay(obj){
    return Object.entries(obj||{}).map(([name,info])=>({
      name,
      rows: info.row_count!=null ? Number(info.row_count).toLocaleString() : "?",
      cols: info.columns.map(c=>c.name+(c.primary_key?" PK":"")+(
        (info.foreign_keys||[]).find(fk=>fk.column===c.name)
          ? "->"+(((info.foreign_keys||[]).find(fk=>fk.column===c.name)||{}).references||"")
          : ""
      )),
      compact: `${name}(${info.columns.map(c=>c.name).join(", ")})`
    }));
  }

  async function onConnect(isSample, res){
    if (res) {
      setDbInfo(res);
      setVerifiedCount(res.trust?.verified||0);
      prevLevel.current = window.BOLO.trustFor(res.trust?.verified||0).key;
      if (res.starters) setStarters(res.starters);
      try {
        const schema = await window.apiCall('/api/schema');
        setRealSchema(schemaObjToDisplay(schema));
      } catch(e){}
      if (res.has_knowledge) { setPhase("ask"); return; }
    }
    setPhase("onboard");
  }
  async function onOnboardDone(seedCount){
    // Refresh trust from real API
    try {
      const s = await window.apiCall('/api/state');
      const n = s.trust?.verified || seedCount;
      setVerifiedCount(n);
      prevLevel.current = window.BOLO.trustFor(n).key;
      if (s.database) setDbInfo(s.database);
      if (s.starters) setStarters(s.starters);
    } catch(e){
      setVerifiedCount(seedCount);
      prevLevel.current = window.BOLO.trustFor(seedCount).key;
    }
    setPhase("ask");
  }
  function onVerify(apiCount){
    setVerifiedCount(c=>{
      if (apiCount !== undefined) return (()=>{ const next=apiCount; const lv=window.BOLO.trustFor(next); if(lv.key!==prevLevel.current){prevLevel.current=lv.key; const msg=lv.key==="assisted"?{title:"Accuracy milestone reached",body:"Confident answers now show immediately — new questions still get a second look."}:{title:"Fully calibrated",body:"All answers appear directly now. Reasoning is always one tap away."}; setToast(msg); setTimeout(()=>setToast(null),4200);} return next; })();
      const next = c+1;
      const lv = window.BOLO.trustFor(next);
      if (lv.key !== prevLevel.current){
        prevLevel.current = lv.key;
        const msg = lv.key==="assisted"
          ? { title:"Accuracy milestone reached", body:"Confident answers now show immediately — new questions still get a second look." }
          : { title:"Fully calibrated", body:"All answers appear directly now. Reasoning is always one tap away." };
        setToast(msg);
        setTimeout(()=>setToast(null), 4200);
      }
      return next;
    });
  }

  async function onDisconnect(){
    try { await window.apiCall('/api/disconnect', {}); } catch(e){}
    setDbInfo(null); setRealSchema(null); setVerifiedCount(0); setStarters([]);
    prevLevel.current = window.BOLO.trustFor(0).key;
    setPhase("connect");
  }

  return (
    <div className="app-shell">
      {phase==="loading" && (
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <Spinner/><div style={{marginTop:12,color:"var(--muted)",fontSize:14}}>Connecting...</div>
          </div>
        </div>
      )}
      {phase==="connect" && <ConnectScreen engine={engine} setEngine={setEngine} onConnect={onConnect}/>}
      {phase==="onboard" && <OnboardScreen onDone={onOnboardDone} dbInfo={dbInfo} schema={realSchema}/>}
      {phase==="ask"     && <AskScreen engine={engine} setEngine={setEngine} modelName={modelName} setModelName={setModelName} verifiedCount={verifiedCount} onVerify={onVerify} onUpdateStarters={setStarters} toast={toast} realSchema={realSchema} dbInfo={dbInfo} starters={starters} onDisconnect={onDisconnect}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
