<!DOCTYPE html>
<html lang="en" data-theme="crisp">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoloDB - Ask your data. Trust the answer.</title>
<style>
/* ============================================================
   BoloDB — design system
   Two themes: "crisp" (clean modern SaaS) + "soft" (warm/human)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* confidence semantics — shared across themes */
  --c-high:   #1B9E6B;
  --c-high-ink:#0F6E48;
  --c-high-tint:#E7F5EE;
  --c-med:    #C2891B;
  --c-med-ink:#8A6210;
  --c-med-tint:#FaF1DA;
  --c-low:    #C75D4E;
  --c-low-ink:#9A4337;
  --c-low-tint:#F8E9E5;

  --ok:#1B9E6B;
  --font-ui: 'Hanken Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* easing */
  --ease: cubic-bezier(.22,.61,.36,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}

/* ---------- THEME: crisp (default) ---------- */
[data-theme="crisp"] {
  --bg: #EEF1F0;
  --bg-grad-a:#EFF2F1;
  --bg-grad-b:#E7ECEA;
  --surface:#FFFFFF;
  --surface-2:#F7F9F8;
  --surface-3:#F0F3F2;
  --ink:#16201B;
  --ink-2:#2C3A33;
  --muted:#5C6B63;
  --faint:#8B978F;
  --border:#E3E8E5;
  --border-2:#D5DCD8;
  --brand:#1B9E6B;
  --brand-ink:#0F6E48;
  --brand-2:#17875B;
  --brand-tint:#E7F5EE;
  --brand-tint-2:#D6EEE0;
  --radius-xs:8px;
  --radius-sm:11px;
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:26px;
  --shadow-sm:0 1px 2px rgba(20,40,30,.06), 0 1px 1px rgba(20,40,30,.04);
  --shadow:0 1px 2px rgba(20,40,30,.05), 0 6px 18px -6px rgba(20,40,30,.14);
  --shadow-lg:0 2px 4px rgba(20,40,30,.05), 0 24px 48px -16px rgba(20,40,30,.22);
  --shadow-brand:0 8px 22px -8px rgba(27,158,107,.5);
  --ring: rgba(27,158,107,.16);
}

/* ---------- THEME: soft (warm/human) ---------- */
[data-theme="soft"] {
  --bg:#F2ECE3;
  --bg-grad-a:#F4EEE5;
  --bg-grad-b:#EDE4D7;
  --surface:#FFFFFF;
  --surface-2:#FBF7F1;
  --surface-3:#F5EFE6;
  --ink:#231E18;
  --ink-2:#3B342B;
  --muted:#796E60;
  --faint:#A99C8B;
  --border:#ECE3D6;
  --border-2:#E0D4C3;
  --brand:#2BA277;
  --brand-ink:#16704F;
  --brand-2:#23906A;
  --brand-tint:#E7F4ED;
  --brand-tint-2:#D6ECDF;
  --radius-xs:11px;
  --radius-sm:15px;
  --radius:19px;
  --radius-lg:26px;
  --radius-xl:34px;
  --shadow-sm:0 1px 2px rgba(80,60,30,.06), 0 1px 1px rgba(80,60,30,.04);
  --shadow:0 2px 6px rgba(90,68,34,.06), 0 10px 26px -8px rgba(90,68,34,.18);
  --shadow-lg:0 3px 8px rgba(90,68,34,.06), 0 30px 60px -18px rgba(90,68,34,.26);
  --shadow-brand:0 10px 28px -8px rgba(43,162,119,.5);
  --ring: rgba(43,162,119,.18);
}

* { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; }
body {
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root { height:100vh; }

button { font-family:inherit; cursor:pointer; }
input,textarea { font-family:inherit; }
::selection { background:var(--brand-tint-2); }

/* scrollbars */
*::-webkit-scrollbar{ width:10px; height:10px; }
*::-webkit-scrollbar-thumb{ background:var(--border-2); border-radius:20px; border:3px solid transparent; background-clip:padding-box; }
*::-webkit-scrollbar-thumb:hover{ background:var(--faint); background-clip:padding-box; }
*::-webkit-scrollbar-track{ background:transparent; }

/* ============================ shell ============================ */
.app-shell{
  height:100vh; width:100vw; overflow:hidden;
  background:
    radial-gradient(1200px 700px at 82% -8%, var(--brand-tint) 0%, transparent 55%),
    linear-gradient(160deg, var(--bg-grad-a), var(--bg-grad-b));
  display:flex; flex-direction:column;
}

/* slide transitions — transform-only so content is ALWAYS visible even if
   the animation timeline is frozen (e.g. a backgrounded/throttled tab). */
.page{ animation:pageIn .5s var(--ease) both; height:100%; }
@keyframes pageIn{ from{ transform:translateY(8px);} to{transform:none;} }

@keyframes rise{ from{transform:translateY(10px);} to{transform:none;} }
@keyframes pop{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }
@keyframes fadein{ from{opacity:0;} to{opacity:1;} }
.rise{ animation:rise .5s var(--ease) both; }

/* ============================ buttons ============================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  border:1px solid transparent; border-radius:var(--radius-sm);
  font-weight:600; font-size:15px; letter-spacing:-.01em;
  padding:12px 20px; transition:transform .14s var(--ease), box-shadow .18s var(--ease), background .18s, border-color .18s, color .18s;
  white-space:nowrap; line-height:1;
}
.btn:active{ transform:translateY(1px) scale(.99); }
.btn-primary{ background:var(--brand); color:#fff; box-shadow:var(--shadow-brand); }
.btn-primary:hover{ background:var(--brand-2); box-shadow:0 12px 30px -8px var(--ring); transform:translateY(-1px); }
.btn-primary:disabled{ background:var(--border-2); color:var(--faint); box-shadow:none; cursor:not-allowed; transform:none; }
.btn-ghost{ background:var(--surface); color:var(--ink); border-color:var(--border-2); box-shadow:var(--shadow-sm); }
.btn-ghost:hover{ border-color:var(--faint); transform:translateY(-1px); box-shadow:var(--shadow); }
.btn-quiet{ background:transparent; color:var(--muted); padding:9px 13px; }
.btn-quiet:hover{ background:var(--surface-3); color:var(--ink); }
.btn-lg{ padding:15px 26px; font-size:16px; border-radius:var(--radius); }
.btn-sm{ padding:8px 14px; font-size:13.5px; gap:6px; }
.btn-block{ width:100%; }

/* ============================ generic card ============================ */
.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow); }

.chip{
  display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  padding:7px 13px; border-radius:999px; font-size:13.5px; font-weight:600;
  border:1px solid var(--border-2); background:var(--surface); color:var(--ink-2);
  transition:all .15s var(--ease); cursor:pointer;
}
.chip:hover{ border-color:var(--brand); color:var(--brand-ink); background:var(--brand-tint); transform:translateY(-1px); }

/* confidence pill */
.conf{
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 13px 6px 11px; border-radius:999px;
  font-size:13px; font-weight:700; letter-spacing:-.01em;
  border:1px solid; line-height:1;
}
.conf .dot{ width:9px; height:9px; border-radius:50%; box-shadow:0 0 0 3px var(--dot-halo); }
.conf-high{ color:var(--c-high-ink); background:var(--c-high-tint); border-color:#BFE6CF; --dot-halo:rgba(27,158,107,.16); }
.conf-high .dot{ background:var(--c-high); }
.conf-med{ color:var(--c-med-ink); background:var(--c-med-tint); border-color:#EBD7A2; --dot-halo:rgba(194,137,27,.16); }
.conf-med .dot{ background:var(--c-med); }
.conf-low{ color:var(--c-low-ink); background:var(--c-low-tint); border-color:#EBC6BD; --dot-halo:rgba(199,93,78,.16); }
.conf-low .dot{ background:var(--c-low); }

/* pulsing dot for "thinking" */
@keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
.pulse{ animation:pulse 1.1s var(--ease) infinite; }

/* shimmer skeleton */
@keyframes shimmer{ 100%{ background-position:-200% 0; } }
.skel{ background:linear-gradient(90deg,var(--surface-3) 8%,var(--surface-2) 18%,var(--surface-3) 33%); background-size:200% 100%; animation:shimmer 1.3s linear infinite; border-radius:8px; }

/* spinner */
@keyframes spin{ to{ transform:rotate(360deg); } }
.spin{ animation:spin .8s linear infinite; }

/* focus ring */
.focusable:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring); border-color:var(--brand); }

/* input */
.field{
  width:100%; border:1.5px solid var(--border-2); background:var(--surface);
  border-radius:var(--radius-sm); padding:13px 15px; font-size:15px; color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
.field::placeholder{ color:var(--faint); }
.field:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 4px var(--ring); }

.mono{ font-family:var(--font-mono); }
.tnum{ font-variant-numeric:tabular-nums; }

/* subtle divider */
.hr{ height:1px; background:var(--border); border:0; }

/* tooltip-ish label */
.kbd{ font-family:var(--font-mono); font-size:11px; padding:2px 6px; border-radius:6px; background:var(--surface-3); border:1px solid var(--border-2); color:var(--muted); }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
/* ============================================================
   BoloDB — sample "TechStore" data + canned answer bank
   Exposed as window.BOLO
   ============================================================ */
(function () {

  // ---- schema (compact-format strings shown in UI) ----
  const schema = [
    { name:"customers", rows:"4,820", cols:["id PK","name","email","segment","country","created_at"],
      compact:"customers(id PK, name, email, segment[consumer,business,vip], country, created_at)" },
    { name:"orders", rows:"38,104", cols:["id PK","customer_id→customers.id","status","total_amount","created_at"],
      compact:"orders(id PK, customer_id→customers.id, status[completed,pending,cancelled,refunded], total_amount, created_at)" },
    { name:"order_items", rows:"96,512", cols:["id PK","order_id→orders.id","product_id→products.id","quantity","unit_price"],
      compact:"order_items(id PK, order_id→orders.id, product_id→products.id, quantity, unit_price)" },
    { name:"products", rows:"312", cols:["id PK","name","category","price","stock"],
      compact:"products(id PK, name, category[laptops,phones,accessories,monitors,audio], price, stock)" },
    { name:"payments", rows:"37,440", cols:["id PK","order_id→orders.id","method","amount","paid_at"],
      compact:"payments(id PK, order_id→orders.id, method[card,paypal,bank], amount, paid_at)" },
  ];

  // ---- glossary drafts proposed during onboarding ----
  const glossary = [
    { term:"Revenue", def:"Sum of total_amount on orders with status = completed", maps:"orders.total_amount", alt:["Net sales","Gross sales","Paid amount"] },
    { term:"Active customer", def:"A customer with at least one order in the last 90 days", maps:"orders.created_at", alt:["Any registered customer","Ordered in last 30 days"] },
    { term:"Top product", def:"Product ranked by units sold (sum of quantity)", maps:"order_items.quantity", alt:["By revenue","By number of orders"] },
  ];

  // ---- starter Q→A pairs generated & run during onboarding ----
  const starters = [
    {
      q:"How many orders were completed last month?",
      restatement:"Count of orders with status “completed” created in the previous calendar month",
      sql:"SELECT COUNT(*) AS completed_orders\nFROM orders\nWHERE status = 'completed'\n  AND created_at >= date('now','start of month','-1 month')\n  AND created_at <  date('now','start of month');",
      columns:["completed_orders"],
      rows:[["3,182"]],
    },
    {
      q:"Which product category brings in the most revenue?",
      restatement:"Total revenue per product category, highest first",
      sql:"SELECT p.category, ROUND(SUM(oi.quantity*oi.unit_price)) AS revenue\nFROM order_items oi\nJOIN products p ON p.id = oi.product_id\nJOIN orders   o ON o.id = oi.order_id\nWHERE o.status = 'completed'\nGROUP BY p.category\nORDER BY revenue DESC;",
      columns:["category","revenue"],
      rows:[["laptops","$1,284,900"],["phones","$902,340"],["monitors","$418,120"],["audio","$211,470"],["accessories","$96,880"]],
    },
    {
      q:"How many customers do we have in each segment?",
      restatement:"Count of customers grouped by segment",
      sql:"SELECT segment, COUNT(*) AS customers\nFROM customers\nGROUP BY segment\nORDER BY customers DESC;",
      columns:["segment","customers"],
      rows:[["consumer","3,910"],["business","712"],["vip","198"]],
    },
  ];

  // ---- main answer bank (matched by keyword to typed question) ----
  // confidence here is the BASE for a brand-new question. The app upgrades it
  // when a similar verified pair exists.
  const bank = [
    {
      id:"top_customers",
      keys:["top customer","biggest spender","best customer","who spends","highest spend","top buyers"],
      q:"Top customers by spend this month",
      restatement:"Total spend per customer this month, highest first",
      sql:"SELECT c.name, ROUND(SUM(o.total_amount)) AS spend\nFROM orders o\nJOIN customers c ON c.id = o.customer_id\nWHERE o.status = 'completed'\n  AND o.created_at >= date('now','start of month')\nGROUP BY c.id\nORDER BY spend DESC\nLIMIT 6;",
      columns:["name","spend"],
      rows:[["Ananya Rao","$7,540"],["Marcus Hale","$6,210"],["Priya Menon","$5,880"],["Devin Cole","$5,120"],["Sofia Lund","$4,690"],["Tom Becker","$4,275"]],
      base:"medium",
    },
    {
      id:"low_stock",
      keys:["low stock","low on stock","on stock","running out","restock","out of stock","inventory","need to reorder","reorder"],
      q:"Which products are low on stock?",
      restatement:"Products with fewer than 15 units in stock, lowest first",
      sql:"SELECT name, category, stock\nFROM products\nWHERE stock < 15\nORDER BY stock ASC;",
      columns:["name","category","stock"],
      rows:[["Aurora 14\" Laptop","laptops","3"],["NovaBuds Pro","audio","6"],["PixelView 27\"","monitors","8"],["Glide Wireless Mouse","accessories","11"],["Zephyr Phone X","phones","14"]],
      base:"medium",
    },
    {
      id:"pending_orders",
      keys:["pending","awaiting","not shipped","open orders","unfulfilled","how many pending"],
      q:"How many orders are pending right now?",
      restatement:"Count of orders currently in “pending” status",
      sql:"SELECT COUNT(*) AS pending_orders\nFROM orders\nWHERE status = 'pending';",
      columns:["pending_orders"],
      rows:[["247"]],
      base:"medium",
    },
    {
      id:"revenue_category",
      keys:["revenue by category","sales by category","category revenue","which category","earn the most","category sales"],
      q:"Revenue by category",
      restatement:"Total revenue per product category, highest first",
      sql:"SELECT p.category, ROUND(SUM(oi.quantity*oi.unit_price)) AS revenue\nFROM order_items oi\nJOIN products p ON p.id = oi.product_id\nJOIN orders   o ON o.id = oi.order_id\nWHERE o.status = 'completed'\nGROUP BY p.category\nORDER BY revenue DESC;",
      columns:["category","revenue"],
      rows:[["laptops","$1,284,900"],["phones","$902,340"],["monitors","$418,120"],["audio","$211,470"],["accessories","$96,880"]],
      base:"medium",
    },
    {
      id:"new_customers",
      keys:["new customer","signed up","new sign","this week","recently joined","new accounts"],
      q:"How many new customers signed up this week?",
      restatement:"Count of customers created in the last 7 days",
      sql:"SELECT COUNT(*) AS new_customers\nFROM customers\nWHERE created_at >= date('now','-7 days');",
      columns:["new_customers"],
      rows:[["86"]],
      base:"medium",
    },
    {
      id:"refund_rate",
      keys:["refund","returned","refund rate","cancellation","cancelled rate","how many refunds"],
      q:"What's our refund rate this quarter?",
      restatement:"Share of orders this quarter with status “refunded”",
      sql:"SELECT ROUND(100.0*\n  SUM(CASE WHEN status='refunded' THEN 1 END)/COUNT(*),1) AS refund_pct\nFROM orders\nWHERE created_at >= date('now','start of month','-2 months');",
      columns:["refund_pct"],
      rows:[["2.4%"]],
      base:"medium",
    },
    {
      id:"avg_order",
      keys:["average order","aov","avg order value","mean order","typical order"],
      q:"What is the average order value?",
      restatement:"Average total_amount across completed orders",
      sql:"SELECT ROUND(AVG(total_amount),2) AS avg_order_value\nFROM orders\nWHERE status = 'completed';",
      columns:["avg_order_value"],
      rows:[["$284.10"]],
      base:"medium",
    },
    {
      id:"vip_spend",
      keys:["vip","vip spend","vip customer","premium customer","how much do vip"],
      q:"How much have VIP customers spent in total?",
      restatement:"Total completed-order spend from customers in the “vip” segment",
      sql:"SELECT ROUND(SUM(o.total_amount)) AS vip_spend\nFROM orders o\nJOIN customers c ON c.id = o.customer_id\nWHERE c.segment = 'vip' AND o.status = 'completed';",
      columns:["vip_spend"],
      rows:[["$412,650"]],
      base:"medium",
    },
  ];

  // a deliberately weak result to demonstrate honesty (no rows / low confidence)
  const lowResult = {
    id:"no_rows",
    restatement:"Orders placed on the moon last Tuesday",
    sql:"SELECT * FROM orders\nWHERE ship_location = 'moon'\n  AND created_at = date('now','-? days');",
    columns:["id","status","total_amount"],
    rows:[],
    confidence:"low",
    reason:"the query ran but returned no rows — this may not match how your data is stored. Try rephrasing.",
  };

  // returned when we genuinely can't map a question to the schema — honesty over a guess
  const unknownResult = {
    id:"unknown",
    restatement:"I couldn't confidently match this question to your tables",
    sql:"-- No reliable query was generated for this question.\n-- Try naming a metric or table, e.g. revenue, orders, customers, stock.",
    columns:[],
    rows:[],
    confidence:"low",
    reason:"I'm not sure how to answer this one yet — try rephrasing, or name the metric or table you mean.",
  };

  // suggested questions surfaced as chips
  const suggestions = [
    "Top customers by spend this month",
    "Which products are low on stock?",
    "Revenue by category",
    "How many orders are pending right now?",
    "What is the average order value?",
    "How many new customers signed up this week?",
  ];

  const providers = [
    { id:"ollama", name:"Local", sub:"Ollama", privacy:"Data never leaves your machine", cost:"Free",
      accuracy:"Good — improves as it learns", badge:"Private", model:"llama3.2", tier:"small",
      tone:"brand", note:"Recommended for private data" },
    { id:"claude", name:"Claude", sub:"Anthropic API", privacy:"Schema + question sent to Anthropic", cost:"Pay per use",
      accuracy:"Highest", badge:"Most accurate", model:"claude-sonnet", tier:"large" },
    { id:"openai", name:"OpenAI", sub:"OpenAI API", privacy:"Schema + question sent to OpenAI", cost:"Pay per use",
      accuracy:"High", badge:"", model:"gpt-4o", tier:"large" },
    { id:"groq", name:"Groq", sub:"Groq API", privacy:"Schema + question sent to Groq", cost:"Pay per use",
      accuracy:"High, very fast", badge:"Fastest", model:"llama-70b", tier:"large" },
  ];

  // trust levels keyed by verified count
  function trustFor(n){
    if (n >= 7) return { key:"trusted",   label:"Trusted",   range:[7,Infinity], idx:2,
      behaviour:"Answers are shown directly. Reasoning is one tap away.", next:null };
    if (n >= 3) return { key:"assisted",  label:"Assisted",  range:[3,6], idx:1,
      behaviour:"Confident answers are shown; novel ones get a second look.", next:7 };
    return { key:"supervised", label:"Supervised", range:[0,2], idx:0,
      behaviour:"Every answer waits for your confirmation while it learns.", next:3 };
  }

  const wrongReasons = [
    { id:"numbers", label:"Wrong numbers" },
    { id:"filter",  label:"Wrong filter / dates" },
    { id:"intent",  label:"Not what I meant" },
    { id:"missing", label:"Missing data" },
    { id:"other",   label:"Something else" },
  ];

  function matchBank(text){
    const t = (text||"").toLowerCase();
    if (/moon|jupiter|yesterday on mars|teleport/.test(t)) return { type:"low" };
    let best=null, score=0;
    bank.forEach(b=>{
      let s=0;
      b.keys.forEach(k=>{ if (t.includes(k)) s += k.length; });
      if (s>score){ score=s; best=b; }
    });
    if (best && score>0) return { type:"bank", item:best };
    // genuinely unmatched -> be honest rather than returning a random answer
    return { type:"unknown" };
  }

  window.BOLO = { schema, glossary, starters, bank, lowResult, unknownResult, suggestions, providers, trustFor, wrongReasons, matchBank };
})();

</script>

<script>

// ── BoloDB API helpers ────────────────────────────────────────────────────────
async function apiCall(path, body) {
  const opts = body
    ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
    : {};
  const r = await fetch(path, opts);
  const data = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(data.detail || ('Request failed: ' + r.status));
  return data;
}
// Convert API rows (array of objects) to 2D arrays for ResultTable
function rowsToArrays(columns, rows) {
  return (rows || []).map(row =>
    (columns || []).map(col => {
      const v = row[col];
      return v === null || v === undefined ? '' : String(v);
    })
  );
}
window.apiCall = apiCall;
window.rowsToArrays = rowsToArrays;

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>

<script type="text/babel">
/* ============================================================
   BoloDB — Onboarding crawl
   profile  ->  glossary  ->  verify starters
   ============================================================ */
function OnboardScreen({ onDone }) {
  const [step,setStep] = React.useState("profile");
  const [realGlossary,setRealGlossary] = React.useState(null);
  const [realStarters,setRealStarters] = React.useState(null);
  const [confirmedGlossary,setConfirmedGlossary] = React.useState(null);
  const [loadErr,setLoadErr] = React.useState("");
  const B = window.BOLO;

  async function loadOnboardData() {
    try {
      const [g, s] = await Promise.all([
        window.apiCall('/api/onboard/glossary',{}),
        window.apiCall('/api/onboard/starters',{})
      ]);
      setRealGlossary(g.glossary || []);
      setRealStarters(s.starters || []);
    } catch(e) {
      setLoadErr(e.message);
      // fall back to canned data if API fails
      setRealGlossary(B.glossary);
      setRealStarters(B.starters);
    }
  }

  return (
    <div className="page" style={{overflowY:"auto"}}>
      <div style={{maxWidth:760,margin:"0 auto",padding:"40px 32px 60px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:30}}>
          <Logo size={26}/>
          <span className="chip" style={{cursor:"default",background:"var(--surface)",color:"var(--brand-ink)",borderColor:"var(--brand-tint-2)"}}>
            <Ico.db style={{width:14,height:14}}/> TechStore · 5 tables
          </span>
        </div>

        <Stepper step={step}/>

        {step==="profile"  && <ProfileStep onNext={()=>{ loadOnboardData(); setStep("glossary"); }}/>}
        {step==="glossary" && <GlossaryStep glossaryItems={realGlossary || B.glossary} onNext={(g)=>{ setConfirmedGlossary(g); setStep("starters"); }}/>}
        {step==="starters" && <StartersStep starterItems={realStarters || B.starters} glossary={confirmedGlossary || []} onDone={onDone}/>}
      </div>
    </div>
  );
}

function Stepper({ step }) {
  const steps = [["profile","Profile"],["glossary","Define terms"],["starters","Verify answers"]];
  const idx = steps.findIndex(s=>s[0]===step);
  return (
    <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:26}}>
      {steps.map((s,i)=>(
        <React.Fragment key={s[0]}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <span style={{width:26,height:26,borderRadius:99,display:"grid",placeItems:"center",
              fontSize:12.5,fontWeight:800,transition:"all .3s var(--ease)",
              background: i<=idx?"var(--brand)":"var(--surface-3)",
              color: i<=idx?"#fff":"var(--faint)",
              border: i<=idx?"none":"1px solid var(--border-2)"}}>
              {i<idx?<Ico.check style={{width:14,height:14}}/>:i+1}
            </span>
            <span style={{fontSize:13.5,fontWeight:650,color: i<=idx?"var(--ink)":"var(--faint)"}}>{s[1]}</span>
          </div>
          {i<steps.length-1 && <div style={{flex:1,height:2,margin:"0 12px",borderRadius:99,
            background: i<idx?"var(--brand)":"var(--border-2)",transition:"background .4s"}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ---- profile / crawl ---- */
function ProfileStep({ onNext }) {
  const B = window.BOLO;
  const [done,setDone] = React.useState(0);
  React.useEffect(()=>{
    if (done < B.schema.length){
      const t=setTimeout(()=>setDone(d=>d+1), 360 + Math.random()*220);
      return ()=>clearTimeout(t);
    } else {
      const t=setTimeout(onNext, 700);
      return ()=>clearTimeout(t);
    }
  },[done]);
  return (
    <div className="rise card" style={{padding:26}}>
      <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Getting to know your database</h2>
      <p style={{margin:"0 0 20px",color:"var(--muted)",fontSize:14.5}}>
        BoloDB profiles each table once — column types, relationships, and the categories your data uses.
        Nothing is uploaded.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {B.schema.map((t,i)=>{
          const state = i<done?"done":i===done?"active":"wait";
          return (
            <div key={t.name} style={{display:"flex",alignItems:"center",gap:13,padding:"12px 15px",
              borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",
              background: state==="active"?"var(--brand-tint)":"var(--surface-2)",
              opacity: state==="wait"?.5:1,transition:"all .3s var(--ease)"}}>
              <span style={{width:26,height:26,borderRadius:8,display:"grid",placeItems:"center",flexShrink:0,
                background: state==="done"?"var(--brand)":state==="active"?"var(--surface)":"var(--surface-3)",
                color: state==="done"?"#fff":"var(--brand)",border:state==="active"?"1px solid var(--brand-tint-2)":"none"}}>
                {state==="done"?<Ico.check style={{width:15,height:15}}/>:state==="active"?<Spinner/>:<Ico.table/>}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                  <span className="mono" style={{fontWeight:700,fontSize:14,color:"var(--ink)"}}>{t.name}</span>
                  <span style={{fontSize:12,color:"var(--faint)",fontWeight:600}} className="tnum">{t.rows} rows</span>
                </div>
                <div className="mono" style={{fontSize:11.5,color:"var(--faint)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {t.cols.join(", ")}
                </div>
              </div>
              {state==="done" && <span style={{fontSize:12,fontWeight:700,color:"var(--brand-ink)"}}>linked</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---- glossary ---- */
function GlossaryStep({ onNext, glossaryItems }) {
  const B = window.BOLO;
  const items = glossaryItems && glossaryItems.length ? glossaryItems : B.glossary;
  const mkItem = (g) => g.def !== undefined ? g : {term:g.term, def:g.maps_to||g.def||"", maps_to:g.maps_to||"", alt:g.alt||[], sql_hint:g.sql_hint||""};
  const glossList = items.map(mkItem);
  const [choices,setChoices] = React.useState(glossList.map(()=>0)); // 0 = the proposed def
  function next(){
    const confirmed = glossList.map((g,gi)=>{
      const opts = [g.def||g.maps_to||"", ...(g.alt||[])];
      return {term:g.term, maps_to: opts[choices[gi]] ?? opts[0], sql_hint: g.sql_hint||""};
    });
    onNext(confirmed);
  }
  return (
    <div className="rise">
      <div className="card" style={{padding:26,marginBottom:16}}>
        <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Confirm what your terms mean</h2>
        <p style={{margin:"0 0 4px",color:"var(--muted)",fontSize:14.5}}>
          BoloDB guessed how a few business words map to your data. Confirm or correct them — this is what keeps
          answers in your language.
        </p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        {glossList.map((g,gi)=>(
          <div key={g.term} className="card rise" style={{padding:20,animationDelay:`${gi*70}ms`}}>
            <div style={{display:"flex",alignItems:"baseline",gap:9,marginBottom:13}}>
              <span style={{fontWeight:800,fontSize:16,letterSpacing:"-.01em",whiteSpace:"nowrap"}}>{g.term}</span>
              <span style={{fontSize:11.5,color:"var(--faint)",fontWeight:600}}>means…</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[g.def||g.maps_to||"",...(g.alt||[])].map((opt,oi)=>{
                const on = choices[gi]===oi;
                return (
                  <button key={oi} onClick={()=>setChoices(c=>c.map((v,i)=>i===gi?oi:v))}
                    className="focusable" style={{display:"flex",alignItems:"center",gap:11,textAlign:"left",
                      padding:"11px 14px",borderRadius:"var(--radius-sm)",cursor:"pointer",
                      background: on?"var(--brand-tint)":"var(--surface-2)",
                      border: on?"1.5px solid var(--brand)":"1.5px solid var(--border)",transition:"all .15s var(--ease)"}}>
                    <span style={{width:18,height:18,borderRadius:99,flexShrink:0,display:"grid",placeItems:"center",
                      border: on?"none":"2px solid var(--border-2)",background: on?"var(--brand)":"transparent"}}>
                      {on && <Ico.check style={{width:11,height:11,color:"#fff"}}/>}
                    </span>
                    <span style={{flex:1,fontSize:14,fontWeight: on?600:500,color: on?"var(--ink)":"var(--ink-2)"}}>{opt}</span>
                    {oi===0 && <span style={{fontSize:10.5,fontWeight:800,padding:"2px 7px",borderRadius:99,
                      background:"var(--surface-3)",color:"var(--faint)",letterSpacing:".03em"}}>SUGGESTED</span>}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:20}}>
        <Button kind="primary" size="lg" iconRight={<Ico.arrow/>} onClick={next}>Save terms &amp; verify answers</Button>
      </div>
    </div>
  );
}

/* ---- starters ---- */
function StartersStep({ onDone, starterItems, glossary }) {
  const B = window.BOLO;
  const starters = starterItems && starterItems.length ? starterItems : B.starters;
  const [ready,setReady] = React.useState(false);
  const [verdicts,setVerdicts] = React.useState(starters.map(()=>null));
  const [saving,setSaving] = React.useState(false); // 'yes'|'no'|null
  React.useEffect(()=>{ const t=setTimeout(()=>setReady(true),900); return ()=>clearTimeout(t); },[]);

  const verifiedCount = verdicts.filter(v=>v==="yes").length;
  const allAnswered = verdicts.every(v=>v!==null);
  function set(i,v){ setVerdicts(arr=>arr.map((x,j)=>j===i?v:x)); }

  async function saveAndFinish() {
    setSaving(true);
    try {
      const verified = starters
        .filter((_,i)=>verdicts[i]==="yes")
        .map(s=>({question:s.q||s.question||"",sql:s.sql||"",restatement:s.restatement||""}));
      await window.apiCall('/api/onboard/save',{glossary:glossary||[],starters:verified});
    } catch(e) { /* best-effort */ }
    onDone(verifiedCount);
  }

  return (
    <div className="rise">
      <div className="card" style={{padding:26,marginBottom:16}}>
        <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700,letterSpacing:"-.02em"}}>Verify a few answers to start warm</h2>
        <p style={{margin:0,color:"var(--muted)",fontSize:14.5}}>
          BoloDB ran some safe questions for you. Confirm the ones that look right — each becomes a verified
          example, so you begin accurate instead of cold.
        </p>
      </div>

      {!ready ? (
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          {starters.map((s,i)=>(
            <div key={i} className="card" style={{padding:20}}>
              <div className="skel" style={{height:15,width:"55%",marginBottom:12}}/>
              <div className="skel" style={{height:13,width:"80%",marginBottom:8}}/>
              <div className="skel" style={{height:38,width:"100%"}}/>
            </div>
          ))}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          {starters.map((s,i)=>(
            <StarterCard key={i} s={s} verdict={verdicts[i]} onYes={()=>set(i,"yes")} onNo={()=>set(i,"no")} delay={i*90}/>
          ))}
        </div>
      )}

      {ready && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:22,
          padding:"15px 20px",borderRadius:"var(--radius)",background:"var(--surface)",border:"1px solid var(--border)",boxShadow:"var(--shadow-sm)"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <span style={{width:34,height:34,borderRadius:10,background:"var(--brand-tint)",color:"var(--brand)",display:"grid",placeItems:"center"}}><Ico.spark/></span>
            <div>
              <div style={{fontWeight:700,fontSize:14.5}}>{verifiedCount} answer{verifiedCount===1?"":"s"} verified</div>
              <div style={{fontSize:12.5,color:"var(--faint)"}}>{verifiedCount>=3?"Enough to reach the Assisted level.":"Verify a couple to seed the knowledge base."}</div>
            </div>
          </div>
          <Button kind="primary" size="lg" disabled={!allAnswered||saving} iconRight={saving?<Spinner/>:<Ico.arrow/>} onClick={saveAndFinish}>
            {allAnswered?"Start asking":"Review each answer"}
          </Button>
        </div>
      )}
    </div>
  );
}

function StarterCard({ s, verdict, onYes, onNo, delay }) {
  return (
    <div className="card rise" style={{padding:20,animationDelay:`${delay}ms`,
      borderColor: verdict==="yes"?"var(--brand-tint-2)":verdict==="no"?"#EBC6BD":"var(--border)",
      transition:"border-color .3s"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:11}}>
        <div style={{fontWeight:700,fontSize:15.5,letterSpacing:"-.01em",lineHeight:1.3}}>{s.q||s.question||""}</div>
        <span style={{fontSize:12.5,color:"var(--faint)",fontWeight:600,whiteSpace:"nowrap",flexShrink:0,display:"flex",alignItems:"center",gap:5}}><Ico.bolt style={{width:13,height:13,color:"var(--brand)"}}/>auto-run</span>
      </div>
      <div style={{marginBottom:13,padding:"11px 14px",
        background:"var(--surface-2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
        <div style={{fontSize:10.5,fontWeight:800,color:"var(--faint)",letterSpacing:".07em",marginBottom:5}}>HERE'S WHAT I DID</div>
        <div style={{fontSize:14,color:"var(--ink)",fontWeight:550,lineHeight:1.4}}>{s.restatement}</div>
      </div>
      <ResultTable columns={s.columns||[]} rows={window.rowsToArrays(s.columns||[], s.rows||[])} max={4}/>
      <SqlBlock sql={s.sql}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:14}}>
        {verdict===null ? (
          <>
            <span style={{fontSize:13.5,fontWeight:650,color:"var(--muted)",marginRight:"auto"}}>Does this look right?</span>
            <Button kind="ghost" size="sm" icon={<Ico.x style={{width:15,height:15}}/>} onClick={onNo}>No</Button>
            <Button kind="primary" size="sm" icon={<Ico.check style={{width:15,height:15}}/>} onClick={onYes}>Yes, correct</Button>
          </>
        ) : (
          <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:13.5,marginLeft:"auto",
            color: verdict==="yes"?"var(--brand-ink)":"var(--c-low-ink)"}}>
            {verdict==="yes"?<><Ico.check style={{width:16,height:16}}/> Saved as a verified example</> : <><Ico.x style={{width:16,height:16}}/> Skipped — thanks, that's useful too</>}
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { OnboardScreen });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — AnswerCard (restatement + confidence + verify flow)
   ============================================================ */
const AnswerCard = React.memo(function AnswerCard({ turn, onVerify, isLatest }) {  // turn.query_id from API

  // turn: { id, question, restatement, confidence, reason, columns, rows, sql, basedOn, verdict, reasonChosen, thinking }
  const B = window.BOLO;
  const [showReasons,setShowReasons] = React.useState(false);
  const [justVerified,setJustVerified] = React.useState(false);

  function yes(){
    setJustVerified(true);
    onVerify(turn.id,"correct",null);
    setTimeout(()=>setJustVerified(false),1600);
  }
  function no(reason){
    setShowReasons(false);
    onVerify(turn.id,"wrong",reason);
  }

  return (
    <div className="rise" style={{marginBottom:26}}>
      {/* question bubble */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <div style={{maxWidth:"72%",padding:"11px 17px",borderRadius:"var(--radius-lg)",borderBottomRightRadius:7,
          background:"var(--ink)",color:"var(--surface)",fontSize:15,fontWeight:550,lineHeight:1.4,boxShadow:"var(--shadow-sm)"}}>
          {turn.question}
        </div>
      </div>

      {/* answer */}
      <div className="card" style={{padding:"20px 22px",borderTopLeftRadius:7,
        borderColor: turn.verdict==="correct"?"var(--brand-tint-2)":turn.verdict==="wrong"?"#EBC6BD":"var(--border)",
        transition:"border-color .4s",position:"relative",overflow:"hidden"}}>

        {justVerified && <Flywheel/>}

        {turn.thinking ? <Thinking confidenceHint={turn.confidence}/> : (
          <>
            {/* restatement + confidence */}
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14,marginBottom:15}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:800,color:"var(--faint)",letterSpacing:".07em",marginBottom:6}}>HERE'S WHAT I DID</div>
                <div style={{fontSize:16.5,fontWeight:600,letterSpacing:"-.01em",lineHeight:1.4,color:"var(--ink)",textWrap:"pretty"}}>{turn.restatement}</div>
                {turn.basedOn && (
                  <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:9,fontSize:12.5,fontWeight:650,
                    color:"var(--brand-ink)",background:"var(--brand-tint)",padding:"4px 10px",borderRadius:99}}>
                    <Ico.history style={{width:13,height:13}}/> Based on an answer you verified before
                  </div>
                )}
              </div>
              <div style={{flexShrink:0}}>
                <ConfidenceBadge level={turn.confidence} reason={turn.reason}/>
              </div>
            </div>

            {turn.reason && turn.confidence!=="high" && (
              <div style={{fontSize:13,color:"var(--muted)",marginBottom:14,marginTop:-6,lineHeight:1.5}}>{cap(turn.reason)}</div>
            )}

            <ResultTable columns={turn.columns} rows={turn.rows}/>
            <SqlBlock sql={turn.sql}/>

            {/* verify zone */}
            <div className="hr" style={{margin:"16px 0 14px"}}/>
            {turn.verdict==null && !showReasons && (
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <span style={{fontSize:13.5,fontWeight:650,color:"var(--ink-2)",marginRight:"auto",display:"flex",alignItems:"center",gap:7}}>
                  <Ico.shield style={{width:15,height:15,color:"var(--brand)"}}/> Is this the answer you wanted?
                </span>
                <Button kind="ghost" size="sm" icon={<Ico.x style={{width:15,height:15}}/>} onClick={()=>setShowReasons(true)}>No</Button>
                <Button kind="primary" size="sm" icon={<Ico.check style={{width:15,height:15}}/>} onClick={yes}>Yes, correct</Button>
              </div>
            )}

            {turn.verdict==null && showReasons && (
              <div className="rise">
                <div style={{fontSize:13.5,fontWeight:700,marginBottom:10,color:"var(--ink)"}}>Thanks — what was off? <span style={{fontWeight:500,color:"var(--faint)"}}>(this is the most useful signal)</span></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {B.wrongReasons.map(r=>(
                    <button key={r.id} className="chip" onClick={()=>no(r.label)}>{r.label}</button>
                  ))}
                  <button className="chip" style={{borderStyle:"dashed",color:"var(--faint)"}} onClick={()=>setShowReasons(false)}>Cancel</button>
                </div>
              </div>
            )}

            {turn.verdict==="correct" && (
              <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:700,fontSize:13.5,color:"var(--brand-ink)"}}>
                <span style={{width:22,height:22,borderRadius:99,background:"var(--brand)",color:"#fff",display:"grid",placeItems:"center"}}><Ico.check style={{width:14,height:14}}/></span>
                Verified — saved to this database's knowledge so similar questions get easier.
              </div>
            )}
            {turn.verdict==="wrong" && (
              <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:650,fontSize:13.5,color:"var(--c-low-ink)"}}>
                <span style={{width:22,height:22,borderRadius:99,background:"var(--c-low-tint)",color:"var(--c-low-ink)",display:"grid",placeItems:"center"}}><Ico.x style={{width:14,height:14}}/></span>
                Logged as “{turn.reasonChosen}.” That failure is captured, not discarded.
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
});

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }

/* thinking state — pipeline shimmer */
function Thinking({ confidenceHint }) {
  const steps = ["Finding the tables that matter","Reading verified examples","Writing the query","Running it on your data"];
  const [active,setActive] = React.useState(0);
  React.useEffect(()=>{
    if (active<steps.length-1){ const t=setTimeout(()=>setActive(a=>a+1),360); return ()=>clearTimeout(t); }
  },[active]);
  return (
    <div style={{padding:"4px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
        <Spinner/><span style={{fontWeight:650,fontSize:14.5,color:"var(--muted)"}}>Working through it…</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:9,fontSize:13,
            color: i<=active?"var(--ink-2)":"var(--faint)",opacity:i<=active?1:.5,transition:"all .3s"}}>
            <span style={{width:16,height:16,borderRadius:99,flexShrink:0,display:"grid",placeItems:"center",
              background:i<active?"var(--brand)":"transparent",border:i<active?"none":"1.5px solid var(--border-2)"}}>
              {i<active && <Ico.check style={{width:10,height:10,color:"#fff"}}/>}
            </span>
            {s}{i===2&&<span style={{fontSize:10.5,fontWeight:700,color:"var(--brand)",background:"var(--brand-tint)",padding:"1px 6px",borderRadius:99}}>schema-linked</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* flywheel flourish on verify */
function Flywheel(){
  return (
    <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:3,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(420px 180px at 80% 0%, var(--brand-tint) 0%, transparent 70%)",animation:"fadein .3s ease both, fadeout .5s ease 1s both"}}/>
      {Array.from({length:7}).map((_,i)=>(
        <span key={i} style={{position:"absolute",top:"22px",right:`${30+i*8}%`,width:6,height:6,borderRadius:99,
          background:"var(--brand)",animation:`spark .9s var(--spring) ${i*40}ms both`}}/>
      ))}
      <style>{`@keyframes fadeout{to{opacity:0}}@keyframes spark{0%{opacity:0;transform:translateY(8px) scale(.4)}40%{opacity:1}100%{opacity:0;transform:translateY(-26px) scale(1)}}`}</style>
    </div>
  );
}

Object.assign(window, { AnswerCard });

</script>

<script type="text/babel">
/* ============================================================
   BoloDB — Ask screen (sidebar + conversation + input + settings)
   ============================================================ */
function AskScreen({ engine, setEngine, verifiedCount, onVerify, toast, realSchema, dbInfo }) {
  const B = window.BOLO;
  const dbLabel = dbInfo ? (dbInfo.url||"").split("/").pop()||dbInfo.dialect : "TechStore";
  const tableCount = dbInfo ? dbInfo.tables : 5;
  const [turns,setTurns] = React.useState([]);
  const [input,setInput] = React.useState("");
  const [settingsOpen,setSettingsOpen] = React.useState(false);
  const [loading,setLoading] = React.useState(false);
  const feedRef = React.useRef(null);

  React.useEffect(()=>{
    if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
  },[turns]);

  async function ask(text){
    const q = (text||input).trim();
    if (!q) return;
    setInput(""); setLoading(true);
    const id = Math.random().toString(36).slice(2,10);
    setTurns(t=>[...t,{id,question:q,thinking:true}]);
    try {
      const data = await window.apiCall('/api/query',{question:q});
      const rows2d = window.rowsToArrays(data.columns||[], data.rows||[]);
      setTurns(t=>t.map(x=>x.id===id?{...x,thinking:false,
        restatement:data.restatement||"",
        sql:data.sql||"",
        columns:data.columns||[],
        rows:rows2d,
        confidence:data.confidence||"medium",
        reason:data.confidence_reason||"",
        basedOn:data.based_on_verified||false,
        query_id:data.query_id||id,
        executionError:data.execution_error||null,
        verdict:null}:x));
    } catch(e) {
      setTurns(t=>t.map(x=>x.id===id?{...x,thinking:false,
        restatement:"Something went wrong — please try again.",
        sql:"",columns:[],rows:[],confidence:"low",
        reason:e.message||"Request failed",basedOn:false,
        query_id:id,verdict:null}:x));
    } finally { setLoading(false); }
  }

    const turnsRef = React.useRef(turns);
  React.useEffect(() => { turnsRef.current = turns; }, [turns]);

  const handleVerify = React.useCallback(async (turnId, verdict, reasonChosen) => {
    setTurns(t=>t.map(x=>x.id===turnId?{...x,verdict,reasonChosen}:x));
    const turn = turnsRef.current.find(x=>x.id===turnId);
    try {
      const r = await window.apiCall('/api/feedback',{
        query_id:turn?.query_id||"", verdict, reason:reasonChosen||"",
        question:turn?.question||"", sql:turn?.sql||"", restatement:turn?.restatement||""});
      if (verdict==="correct") {
        if (r.trust) onVerify(r.trust.verified);
        else onVerify();
      }
    } catch(e) {
      if (verdict==="correct") onVerify();
    }
  }, [onVerify]);

  const trust = B.trustFor(verifiedCount);

  return (
    <div className="page" style={{display:"flex",height:"100%"}}>
      <Sidebar engine={engine} verifiedCount={verifiedCount} onSettings={()=>setSettingsOpen(true)} schema={realSchema} dbInfo={dbInfo}/>

      {/* main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,position:"relative"}}>
        {/* top bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 28px",
          borderBottom:"1px solid var(--border)",background:"color-mix(in srgb, var(--surface) 70%, transparent)",backdropFilter:"blur(8px)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{width:30,height:30,borderRadius:9,background:"var(--brand-tint)",color:"var(--brand)",display:"grid",placeItems:"center"}}><Ico.db/></span>
            <div>
              <div style={{fontWeight:700,fontSize:14.5,lineHeight:1.1}}>{dbLabel}</div>
              <div style={{fontSize:11.5,color:"var(--faint)",fontWeight:600}}>{tableCount} tables · read-only</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <TrustPill level={trust} count={verifiedCount}/>
            {turns.length>0 && <Button kind="quiet" size="sm" icon={<Ico.plus/>} onClick={()=>setTurns([])}>New thread</Button>}
          </div>
        </div>

        {/* feed */}
        <div ref={feedRef} style={{flex:1,overflowY:"auto",padding:"28px 28px 8px"}}>
          <div style={{maxWidth:720,margin:"0 auto"}}>
            {turns.length===0 ? <Empty trust={trust} onPick={ask}/> :
              turns.map((t,i)=>(
                <AnswerCard key={t.id} turn={t} isLatest={i===turns.length-1}
                  onVerify={handleVerify}/>
              ))}
          </div>
        </div>

        {/* input */}
        <div style={{padding:"14px 28px 20px",borderTop:"1px solid var(--border)",background:"var(--surface)"}}>
          <div style={{maxWidth:720,margin:"0 auto"}}>
            <form onSubmit={e=>{e.preventDefault();ask();}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"7px 7px 7px 18px",
                border:"1.5px solid var(--border-2)",borderRadius:"var(--radius-lg)",background:"var(--surface)",
                boxShadow:"var(--shadow-sm)",transition:"border-color .15s, box-shadow .15s"}}
              onFocus={e=>{e.currentTarget.style.borderColor="var(--brand)";e.currentTarget.style.boxShadow="0 0 0 4px var(--ring)";}}
              onBlur={e=>{e.currentTarget.style.borderColor="var(--border-2)";e.currentTarget.style.boxShadow="var(--shadow-sm)";}}>
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Ask anything about your data…"
                style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:15.5,color:"var(--ink)"}}/>
              <Button kind="primary" type="submit" disabled={!input.trim()||loading} icon={loading?<Spinner/>:<Ico.send/>}>Ask</Button>
            </form>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginTop:10,fontSize:12,color:"var(--faint)"}}>
              <Ico.lock style={{width:13,height:13}}/> {engine==="ollama"?"Running on your machine — nothing leaves this device.":"Only the schema and your question are sent to generate SQL."}
            </div>
          </div>
        </div>

        {toast && <TrustToast toast={toast}/>}
      </div>

      {settingsOpen && <Settings engine={engine} setEngine={setEngine} onClose={()=>setSettingsOpen(false)}/>}
    </div>
  );
}

/* ---------- empty state ---------- */
function Empty({ trust, onPick }) {
  const B = window.BOLO;
  return (
    <div className="rise" style={{paddingTop:34,textAlign:"center"}}>
      <div style={{width:54,height:54,borderRadius:16,background:"var(--brand)",color:"#fff",display:"grid",placeItems:"center",margin:"0 auto 18px",boxShadow:"var(--shadow-brand)"}}>
        <Ico.spark style={{width:26,height:26}}/>
      </div>
      <h2 style={{fontSize:25,fontWeight:800,letterSpacing:"-.025em",margin:"0 0 8px"}}>What would you like to know?</h2>
      <p style={{fontSize:15,color:"var(--muted)",margin:"0 auto 24px",maxWidth:440,lineHeight:1.55}}>
        Ask in plain English. You'll get a plain-English restatement, a confidence level, and the rows —
        with the SQL one tap away.
      </p>
      <div style={{display:"flex",flexWrap:"wrap",gap:9,justifyContent:"center",maxWidth:560,margin:"0 auto"}}>
        {B.suggestions.map(s=>(
          <button key={s} className="chip" onClick={()=>onPick(s)} style={{fontWeight:550}}>
            <Ico.arrow style={{width:14,height:14,color:"var(--brand)"}}/>{s}
          </button>
        ))}
      </div>
    </div>
